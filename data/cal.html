

	<script>

	var TimeOutSec = 1200;
	var BoxSize = 600;
	var AzimuthADC = 0;
	var Endstop = 0;
	var Status = 4;
	var StatusTmp = 0;
	var CcwRaw = 0;
	var CwRaw = 0;
	var AzShift = 0;
	var AzRange = 0;
	var Uptime = 0;
	var UptimeTmp = 0;
	var NoEndstopLowZone = 0.5;
	var NoEndstopHighZone = 2.8;
	var Elevation = 0;
	var DragState = null;
	var IsSavingEndstops = false;
	var StaticInitialized = false;
	var LowZoneMin = 0.2;
	var LowZoneMax = 1.5;
	var HighZoneMin = 1.6;
	var HighZoneMax = 3.1;
	var EndstopWarningText = "";

	setInterval(function() { getData();}, 200); //mSeconds update rate
	getSet();
	setTimeout(() => { renderCanvas(); attachEndstopDrag(); }, 1000);

	function voltageToCanvas(voltage){
		return (Number(BoxSize)-60)/3.3 * Number(voltage) + 30;
	}

	function adcToCanvas(rawValue){
		return (Number(BoxSize)-60)/33 * Number(rawValue) / 100 + 30;
	}

	function clamp(value, minValue, maxValue){
		return Math.min(maxValue, Math.max(minValue, value));
	}

	function normalizeZoneValue(value, minValue, maxValue){
		return clamp(Math.round(Number(value) * 10) / 10, minValue, maxValue);
	}

	function renderCanvas(){
		var canvas = document.getElementById("Azimuth");
		if(!canvas){
			return;
		}
		updateEndstopWarning();
		var context = canvas.getContext("2d");
		context.clearRect(0, 0, BoxSize, 140);
		Static();
		POINTER(AzimuthADC);
		StaticInitialized = true;
	}

	function updateEndstopWarning(){
		if(Endstop != 0){
			EndstopWarningText = "";
			return;
		}
		if(Number(NoEndstopLowZone) < 0.5 || Number(NoEndstopHighZone) > 2.8){
			EndstopWarningText = "Warning: Braking space may be too small and the rotator may be physically damaged.";
		}else{
			EndstopWarningText = "";
		}
	}

	function updateCanvasCursor(pointerX, pointerY){
		var canvas = document.getElementById("Azimuth");
		if(!canvas){
			return;
		}
		if(Endstop != 0){
			canvas.style.cursor = "default";
			return;
		}
		var handle = getHandleAtPosition(pointerX, pointerY);
		canvas.style.cursor = handle ? "ew-resize" : "default";
	}

	function getCanvasPoint(event){
		var canvas = document.getElementById("Azimuth");
		var rect = canvas.getBoundingClientRect();
		var source = event.touches && event.touches.length ? event.touches[0] : event;
		return {
			x: (source.clientX - rect.left) * (canvas.width / rect.width),
			y: (source.clientY - rect.top) * (canvas.height / rect.height)
		};
	}

	function getHandleAtPosition(pointerX, pointerY){
		if(Endstop != 0){
			return null;
		}
		var lowX = voltageToCanvas(NoEndstopLowZone);
		var highX = voltageToCanvas(NoEndstopHighZone);
		if(pointerY <= 48 && Math.abs(pointerX - lowX) <= 14){
			return "low";
		}
		if(pointerY <= 48 && Math.abs(pointerX - highX) <= 14){
			return "high";
		}
		return null;
	}

	function updateDraggedEndstop(pointerX){
		if(!DragState){
			return;
		}
		var voltage = (pointerX - 30) * 3.3 / (Number(BoxSize) - 60);
		if(DragState === "low"){
			NoEndstopLowZone = normalizeZoneValue(voltage, LowZoneMin, LowZoneMax);
		}else if(DragState === "high"){
			NoEndstopHighZone = normalizeZoneValue(voltage, HighZoneMin, HighZoneMax);
		}
		renderCanvas();
	}

	function saveEndstopZones(){
		if(IsSavingEndstops){
			return;
		}
		IsSavingEndstops = true;
		var request = new XMLHttpRequest();
		request.onreadystatechange = function() {
			if (this.readyState == 4) {
				IsSavingEndstops = false;
				if (this.status != 200) {
					getSet();
				}
			}
		};
		request.open("GET", "setEndstopZones?low=" + Math.round(Number(NoEndstopLowZone) * 10) + "&high=" + Math.round(Number(NoEndstopHighZone) * 10), true);
		request.send();
	}

	function attachEndstopDrag(){
		var canvas = document.getElementById("Azimuth");
		if(!canvas){
			return;
		}

		canvas.addEventListener("mousedown", function(event){
			var point = getCanvasPoint(event);
			var handle = getHandleAtPosition(point.x, point.y);
			if(handle){
				DragState = handle;
				updateDraggedEndstop(point.x);
				event.preventDefault();
			}
		});

		canvas.addEventListener("mousemove", function(event){
			var point = getCanvasPoint(event);
			if(DragState){
				updateDraggedEndstop(point.x);
				event.preventDefault();
			}else{
				updateCanvasCursor(point.x, point.y);
			}
		});

		canvas.addEventListener("touchstart", function(event){
			var point = getCanvasPoint(event);
			var handle = getHandleAtPosition(point.x, point.y);
			if(handle){
				DragState = handle;
				updateDraggedEndstop(point.x);
				event.preventDefault();
			}
		}, { passive: false });

		canvas.addEventListener("touchmove", function(event){
			if(!DragState){
				return;
			}
			var point = getCanvasPoint(event);
			updateDraggedEndstop(point.x);
			event.preventDefault();
		}, { passive: false });

		window.addEventListener("mouseup", function(){
			if(DragState){
				DragState = null;
				saveEndstopZones();
			}
		});

		window.addEventListener("touchend", function(){
			if(DragState){
				DragState = null;
				saveEndstopZones();
			}
		});
	}

	function getSet() {
	  var ghttp = new XMLHttpRequest();
	  ghttp.onreadystatechange = function() {
	    if (this.readyState == 4 && this.status == 200) {
	      // document.getElementById("StartValue").innerHTML = this.responseText;
				Elevation = this.responseText;
				// console.log ('Elevation ' + Elevation);
				renderCanvas();
	    }
	  };
	  ghttp.open("GET", "readElevation", true);
	  ghttp.send();

		var ghttp = new XMLHttpRequest();
	  ghttp.onreadystatechange = function() {
	    if (this.readyState == 4 && this.status == 200) {
	      // document.getElementById("StartValue").innerHTML = this.responseText;
				AzShift = this.responseText;
				// console.log ('AzShift ' + AzShift);
				renderCanvas();
	    }
	  };
	  ghttp.open("GET", "readStart", true);
	  ghttp.send();

	  var hhttp = new XMLHttpRequest();
	  hhttp.onreadystatechange = function() {
	    if (this.readyState == 4 && this.status == 200) {
	      // document.getElementById("StartValue").innerHTML = this.responseText;
				AzRange = this.responseText;
				// console.log ('AzRange ' + AzRange);
				renderCanvas();
	    }
	  };
	  hhttp.open("GET", "readMax", true);
	  hhttp.send();

	  var ihttp = new XMLHttpRequest();
	  ihttp.onreadystatechange = function() {
	    if (this.readyState == 4 && this.status == 200) {
	      // document.getElementById("StartValue").innerHTML = this.responseText;
				Endstop = this.responseText;
				// console.log ('Endstop ' + Endstop);
				renderCanvas();
	    }
	  };
	  ihttp.open("GET", "readEndstop", true);
	  ihttp.send();

	  var lhttp = new XMLHttpRequest();
	  lhttp.onreadystatechange = function() {
	    if (this.readyState == 4 && this.status == 200) {
	      // document.getElementById("StartValue").innerHTML = this.responseText;
				NoEndstopLowZone = normalizeZoneValue(this.responseText, LowZoneMin, LowZoneMax);
				// console.log ('Endstop ' + Endstop);
				renderCanvas();
	    }
	  };
	  lhttp.open("GET", "readEndstopLowZone", true);
	  lhttp.send();

	  var mhttp = new XMLHttpRequest();
	  mhttp.onreadystatechange = function() {
	    if (this.readyState == 4 && this.status == 200) {
	      // document.getElementById("StartValue").innerHTML = this.responseText;
				NoEndstopHighZone = normalizeZoneValue(this.responseText, HighZoneMin, HighZoneMax);
				// console.log ('Endstop ' + Endstop);
				renderCanvas();
	    }
	  };
	  mhttp.open("GET", "readEndstopHighZone", true);
	  mhttp.send();

	  var jhttp = new XMLHttpRequest();
	  jhttp.onreadystatechange = function() {
	    if (this.readyState == 4 && this.status == 200) {
	      // document.getElementById("StartValue").innerHTML = this.responseText;
				CcwRaw = this.responseText;
				// console.log ('Endstop ' + Endstop);
				renderCanvas();
	    }
	  };
	  jhttp.open("GET", "readCcwraw", true);
	  jhttp.send();

	  var khttp = new XMLHttpRequest();
	  khttp.onreadystatechange = function() {
	    if (this.readyState == 4 && this.status == 200) {
	      // document.getElementById("StartValue").innerHTML = this.responseText;
				CwRaw = this.responseText;
				// console.log ('Endstop ' + Endstop);
				renderCanvas();
	    }
	  };
	  khttp.open("GET", "readCwraw", true);
	  khttp.send();
	}

	function getData() {
		var fhttp = new XMLHttpRequest();
		fhttp.onreadystatechange = function() {
			if (this.readyState == 4 && this.status == 200) {
				document.getElementById("frontAZValue").innerHTML = this.responseText;
				// console.log ('OnlineTimer ' + OnlineTimer);
			}
		};
		fhttp.open("GET", "readFrontAZ", true);
		fhttp.send();

	  var whttp = new XMLHttpRequest();
	  whttp.onreadystatechange = function() {
	    if (this.readyState == 4 && this.status == 200) {
	      // document.getElementById("AZadcValue").innerHTML = this.responseText;
				AzimuthADC = this.responseText;
				if(StaticInitialized){
					POINTER(AzimuthADC);
				}
				// Static();
				// StaticBot();
				// console.log ('getData.Azimuth ' + Azimuth);
	    }
	  };
	  whttp.open("GET", "readAZadc", true);
	  whttp.send();

	  var xhttp = new XMLHttpRequest();
	  xhttp.onreadystatechange = function() {
	    if (this.readyState == 4 && this.status == 200) {
	      // document.getElementById("AZadcValue").innerHTML = this.responseText;
				Uptime = this.responseText;
	    }
	  };
	  xhttp.open("GET", "readUptime", true);
	  xhttp.send();

	  var zhttp = new XMLHttpRequest();
	  zhttp.onreadystatechange = function() {
	    if (this.readyState == 4 && this.status == 200) {
	      // document.getElementById("StatValue").innerHTML = this.responseText;
				Status = this.responseText;
				if( Number(StatusTmp)!=Number(Status) ){
					if(StaticInitialized){
						POINTER(AzimuthADC);
					}
				// 	AZ(Azimuth);
				// 	Static();
				// 	StaticBot();
					StatusTmp=Status;
				}
	    }
	  };
	  zhttp.open("GET", "readStat", true);
	  zhttp.send();
	}

	//---------------------------------------------------------------

	function POINTER(PointerValue){
	  var c = document.getElementById("Azimuth");
	  var pointer = c.getContext("2d");
		pointer.clearRect(0, 52, BoxSize, 98);
		pointer.lineWidth = 5;
		pointer.fillStyle = "#c00000";
		pointer.font = "bold 20px Arial";
		pointer.textAlign = 'center';
		pointer.textBaseline = 'middle';

		pointer.beginPath();
			pointer.fillStyle = "#303030";
			var CWpos = adcToCanvas(CwRaw);
			var CCWpos = adcToCanvas(CcwRaw);
			// console.log ('CcwRaw ' + CcwRaw);
			// console.log ('CwRaw ' + CwRaw);
			// console.log ('Ccw ' + CCWpos );
			// console.log ('Cw ' + CWpos);
				pointer.moveTo( CCWpos, 55);
				pointer.lineTo( CCWpos+7, 65);
				pointer.lineTo( CCWpos, 75);

				pointer.moveTo( CWpos, 55);
				pointer.lineTo( CWpos-7, 65);
				pointer.lineTo( CWpos, 75);
				if(Elevation==0){
					pointer.fillText( Number(AzShift) + "°", CCWpos, 90+20);
					pointer.fillText( Number(AzShift) + Number(AzRange) + "°", CWpos, 90+20);
				}else{
					pointer.fillText( "0°", CCWpos, 90+20);
					pointer.fillText( Number(AzRange) + "°", CWpos, 90+20);
				}
		pointer.fill();

		var Position = adcToCanvas(PointerValue);
		// console.log ('Position ' + Position);
	  pointer.beginPath();
			pointer.moveTo( Number(Position), 55);
		  pointer.lineTo( Number(Position)+5, 75);
		  pointer.lineTo( Number(Position)-5, 75);
			// console.log ('PointerValue ' + PointerValue);
			// console.log ('NoEndstopLowZone ' + NoEndstopLowZone);
			if (Status != 4) {
				pointer.fillStyle = "#c00000";
			}else{
				if(Number(PointerValue)/1000 > Number(NoEndstopLowZone) && Number(PointerValue)/1000 < Number(NoEndstopHighZone)){
					pointer.fillStyle = "#00c000";
				}else{
					pointer.fillStyle = "orange";
				}
			}
			pointer.fillText( Number(PointerValue)/1000 + "V", Number(Position), 90);
		pointer.fill();

		if(Uptime<TimeOutSec){
			UptimeTmp=TimeOutSec-Uptime;
			pointer.font = "12px Arial";
			pointer.fillStyle = "#303030";
			pointer.fillText( "Please calibrate after the parameter has stabilized", Number(BoxSize/2), 130);
		}
	}

	function convertStoMs(seconds) {
         let minutes = Math.floor(seconds / 60);
         let extraSeconds = seconds % 60;
         minutes = minutes < 10 ? "0" + minutes : minutes;
         extraSeconds = extraSeconds< 10 ? "0" + extraSeconds : extraSeconds;
         return minutes + ":" + extraSeconds ;
      }

	function Static(){
	  var con = document.getElementById("Azimuth");

	  // endstop
		if(Endstop==0){
			var endstop = con.getContext("2d");
			endstop.beginPath();
			// endstop.rotate(90 * Math.PI / 180);
			endstop.lineWidth = 8;
			endstop.strokeStyle = 'orange';
			// endstop.moveTo(30, 45);
			endstop.moveTo(voltageToCanvas(0.142), 45);
			endstop.lineTo(voltageToCanvas(NoEndstopLowZone), 45);
			// endstop.moveTo(BoxSize-30, 45);
			endstop.moveTo(voltageToCanvas(3.155), 45);
			endstop.lineTo(voltageToCanvas(NoEndstopHighZone), 45);
			// endstop.lineTo( (Number(BoxSize)-30)-(Number(BoxSize)-60)/3.3*Number(NoEndstopHighZone), 45);
			endstop.fillStyle = "orange";
			endstop.font = "bold 10px Arial";
			endstop.textAlign = 'center';
			endstop.textBaseline = 'middle';
			endstop.fillText( "SW endstop", 70, 20);
			endstop.fillText( "endstop", 550, 20);
			endstop.stroke();

			drawEndstopHandle(endstop, voltageToCanvas(NoEndstopLowZone), NoEndstopLowZone, "low");
			drawEndstopHandle(endstop, voltageToCanvas(NoEndstopHighZone), NoEndstopHighZone, "high");
			if(EndstopWarningText !== ""){
				endstop.font = "bold 13px Arial";
				endstop.fillStyle = "#990000";
				endstop.textAlign = "center";
				endstop.textBaseline = "top";
				endstop.fillText("Warning: Braking space may be too small", Number(BoxSize/2), 0);
				endstop.fillText("and the rotator may be physically damaged.", Number(BoxSize/2), 13);
			}
		}

	  // scale
	  var scale = con.getContext("2d");
	  scale.beginPath();
	  scale.lineWidth = 2;
	  scale.strokeStyle = "#000000";
		scale.moveTo(30, 50);
		scale.lineTo(Number(BoxSize)-30, 50);
	  scale.font = "20px Arial";
		scale.textAlign = 'center';
	  scale.fillStyle = "#303030";
	    for(var i=0;i<34;i++){
				scale.moveTo( (Number(BoxSize)-60)/33*i+30, 50);
	  		if(i %10 === 0){
					scale.lineTo((Number(BoxSize)-60)/33*i+30, 30);
					scale.fillText(Number(i)/10, (Number(BoxSize)-60)/33*i+30, 20);
				}else	if(i %5 === 0){
					scale.lineTo((Number(BoxSize)-60)/33*i+30, 35);
	  		}else{
	  			scale.lineTo((Number(BoxSize)-60)/33*i+30, 40);
	  		}
	    }
	  scale.stroke();
	}

	function drawEndstopHandle(ctx, xPos, voltageValue, side){
		ctx.beginPath();
		ctx.lineWidth = 2;
		ctx.strokeStyle = "orange";
		ctx.moveTo(xPos, 41);
		ctx.lineTo(xPos, 16);
		ctx.stroke();

		ctx.beginPath();
		ctx.fillStyle = "orange";
		ctx.arc(xPos, 11, 5, 0, 2 * Math.PI);
		ctx.fill();

		ctx.font = "bold 12px Arial";
		ctx.textAlign = side === "low" ? "left" : "right";
		ctx.textBaseline = "middle";
		ctx.fillText(Number(voltageValue).toFixed(1) + "V", side === "low" ? xPos + 10 : xPos - 10, 28);
	}


	</script>
	</body>
	</html>
