</style></head><body><div class="wrap"><table id="tbl"><thead><tr id="hdr"><th data-c="time" class="c-time">UTC</th><th data-c="freq" class="c-freq">kHz</th><th data-c="dx" class="c-dx">DX</th><th data-c="spotter" class="c-spotter">Spotter</th><th data-c="type" class="c-type">Type</th><th data-c="db" class="c-db">dB</th><th data-c="wpm" class="c-wpm">WPM</th><th data-c="comment" class="c-comment">Info</th><th data-c="raw" class="c-raw">Raw</th></tr></thead><tbody id="body"></tbody></table><pre id="raw" class="raw"></pre></div><div id="cols"></div><div class="bar"><span class="title">DXC</span><span id="ws" class="s bad">WS off</span><span id="tn" class="s warn">Telnet ?</span><span id="cnt" class="s n">0</span><input id="cmd" autocomplete="off" spellcheck="false" placeholder="DX cluster command, Enter sends CR/LF"><button id="send">Send</button><button id="recon">Reconnect Telnet</button><button id="mode">Raw</button><button id="colbtn">Columns</button><button id="clear">Clear</button><span class="hint">LMB on DX = rotate, RMB = Google</span></div><script>
(function(){"use strict";var MAX=500,RAWMAX=60000,WS_PATH="/dxcws",RECONNECT_CMD="@reconnect",MAP_LOCATOR_FALLBACK="JO60UC",rows=[],rawLines=[],hidden={},rawMode=false,ws=null,rtimer=0,mapSource=1,mapLocator=MAP_LOCATOR_FALLBACK,mapDatasetReady=false,mapDatasetLoading=false,mapDatasetWaiters=[],dxccPrefixIndex=null,search=new URLSearchParams(location.search),wsHost=search.get("ws_host")||location.hostname,wsPort=search.get("ws_port")||location.port,tbody=document.getElementById("body"),raw=document.getElementById("raw"),cnt=document.getElementById("cnt"),cmd=document.getElementById("cmd"),wsEl=document.getElementById("ws"),tnEl=document.getElementById("tn"),cols=document.getElementById("cols"),names={time:"UTC",freq:"kHz",dx:"DX",spotter:"Spotter",type:"Type",db:"dB",wpm:"WPM",comment:"Info",raw:"Raw"};
try{hidden=JSON.parse(localStorage.dxcCols||"{}")||{}}catch(e){hidden={}}
function esc(s){return String(s||"").replace(/[&<>\"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})}

function applyCols(){Object.keys(names).forEach(function(c){var on=!hidden[c];document.querySelectorAll('[data-c="'+c+'"],.c-'+c).forEach(function(e){e.classList.toggle("hide",!on)})});try{localStorage.dxcCols=JSON.stringify(hidden)}catch(e){}buildCols()}
function buildCols(){var h="";Object.keys(names).forEach(function(c){h+='<label><input type="checkbox" data-x="'+c+'" '+(!hidden[c]?"checked":"")+'> '+names[c]+'</label>'});cols.innerHTML=h}
function splitComment(text){var rest=String(text||"").trim(),parts={type:"",db:"",wpm:"",comment:""};var m=rest.match(/\b(CQ|DE)\b/i);if(m){parts.type=m[1].toUpperCase();rest=(rest.slice(0,m.index)+" "+rest.slice(m.index+m[0].length)).trim()}m=rest.match(/(?:^|\s)(-?\d+(?:\.\d+)?)\s*dB\b/i);if(m){parts.db=m[1];rest=(rest.slice(0,m.index)+" "+rest.slice(m.index+m[0].length)).trim()}m=rest.match(/(?:^|\s)(\d+(?:\.\d+)?)\s*WPM\b/i);if(m){parts.wpm=m[1];rest=(rest.slice(0,m.index)+" "+rest.slice(m.index+m[0].length)).trim()}parts.comment=rest.replace(/\s{2,}/g," ").trim();return parts}
function parse(line){var s=line.replace(/\r/g,"").trim(),m,p;if(!s)return null;m=s.match(/^DX\s+de\s+(\S+):\s*([0-9.]+)\s+(\S+)\s*(.*?)\s+([0-2][0-9][0-5][0-9])Z?\s*$/i);if(m){p=splitComment(m[4]);return{spotter:m[1],freq:m[2],dx:m[3],type:p.type,db:p.db,wpm:p.wpm,comment:p.comment,time:m[5],raw:s}}m=s.match(/^(\S+)\s+([0-9.]+)\s+(\S+)\s+(.*?)\s+([0-2][0-9][0-5][0-9])Z?\s*$/);if(m){p=splitComment(m[4]);return{spotter:m[1],freq:m[2],dx:m[3],type:p.type,db:p.db,wpm:p.wpm,comment:p.comment,time:m[5],raw:s}}return{spotter:"",freq:"",dx:"",type:"",db:"",wpm:"",comment:"",time:"",raw:s}}
function normalizeCallsign(value){return String(value||"").trim().toUpperCase().replace(/[^A-Z0-9\/]/g,"")}
function normalizeMaidenheadLocator(locator){var loc=String(locator||"").trim().toUpperCase();if(/^[A-R]{2}[0-9]{2}$/.test(loc))return loc;if(/^[A-R]{2}[0-9]{2}[A-X]{2}$/.test(loc))return loc;return""}
function maidenheadToLatLon(locator){var loc=normalizeMaidenheadLocator(locator);var lon,lat;if(!loc)return null;lon=(loc.charCodeAt(0)-65)*20-180;lon+=(loc.charCodeAt(2)-48)*2;lat=(loc.charCodeAt(1)-65)*10-90;lat+=(loc.charCodeAt(3)-48)*1;if(loc.length>=6){lon+=(loc.charCodeAt(4)-65)*(5/60);lon+=2.5/60;lat+=(loc.charCodeAt(5)-65)*(2.5/60);lat+=1.25/60}else{lon+=1;lat+=0.5}return{lat:lat,lon:lon}}
function degToRad(deg){return deg*Math.PI/180}

function ensureMapDataset(onReady){if(mapDatasetReady){dxccPrefixIndex=null;if(onReady)onReady();return}if(onReady)mapDatasetWaiters.push(onReady);if(mapDatasetLoading)return;mapDatasetLoading=true;function flushWaiters(){var waiters=mapDatasetWaiters.slice();mapDatasetWaiters=[];for(var i=0;i<waiters.length;i++){if(waiters[i])waiters[i]()}}function cleanup(){window.removeEventListener("map50-ready",handleReady);window.removeEventListener("map50-error",handleError)}function handleReady(){cleanup();mapDatasetLoading=false;mapDatasetReady=true;dxccPrefixIndex=null;flushWaiters()}function handleError(){cleanup();mapDatasetLoading=false;mapDatasetWaiters=[]}window.addEventListener("map50-ready",handleReady);window.addEventListener("map50-error",handleError);var script=document.createElement("script");script.src="/map50.js";script.onerror=function(){cleanup();mapDatasetLoading=false};document.head.appendChild(script)}
function ensureDxccPrefixIndex(){var labels=window.DXCC_PREFIX_LABELS||[],i,row,prefix,area;if(dxccPrefixIndex)return dxccPrefixIndex;dxccPrefixIndex={};for(i=0;i<labels.length;i++){row=labels[i];prefix=String(row[2]||"").toUpperCase();if(!prefix)continue;area=Number(row[3]||0);if(!dxccPrefixIndex[prefix]||area>Number(dxccPrefixIndex[prefix].area||0)){dxccPrefixIndex[prefix]={label:prefix,lat:row[0]/100,lon:row[1]/100,area:area,name:row[4]||prefix}}}return dxccPrefixIndex}
function findBestPrefixForCallsign(callsign){var input=normalizeCallsign(callsign),prefixIndex=ensureDxccPrefixIndex(),prefixes=Object.keys(prefixIndex).sort(function(a,b){return b.length-a.length}),i,prefix;if(!input)return null;for(i=0;i<prefixes.length;i++){prefix=prefixes[i];if(input.indexOf(prefix)===0)return prefixIndex[prefix]}return null}
function rotateToAzimuth(targetAzimuth,onDone){var azimuth=Math.round(Number(targetAzimuth)),http;if(!isFinite(azimuth)){if(onDone)onDone(false,"Invalid azimuth");return}http=new XMLHttpRequest();http.open("POST","/",true);http.setRequestHeader("Content-type","application/x-www-form-urlencoded");http.onreadystatechange=function(){if(http.readyState!==4)return;if(http.status===200){if(onDone)onDone(true,http.responseText)}else{if(onDone)onDone(false,http.responseText)}};http.send("ROT="+encodeURIComponent(String(azimuth)))}

function initRotateContext(){readText("/readMapSource",function(value){if(value!==""){mapSource=Number(value)}});readText("/readMapLocator",function(value){var locator=normalizeMaidenheadLocator(value);if(locator)mapLocator=locator})}
function addLine(line){if(!line)return;rawLines.push(line);var r=rawLines.join("\n");if(r.length>RAWMAX){rawLines=r.slice(-RAWMAX).split("\n")}raw.textContent=rawLines.join("\n");var p=parse(line);if(!p)return;rows.push(p);if(rows.length>MAX)rows.shift();render();raw.scrollTop=raw.scrollHeight}

function connect(){clearTimeout(rtimer);try{ws&&ws.close()}catch(e){}var proto=location.protocol==="https:"?"wss://":"ws://",host=wsHost;if(wsPort){host+=":"+wsPort}ws=new WebSocket(proto+host+WS_PATH);setClass(wsEl,"WS ...","warn");ws.onopen=function(){setClass(wsEl,"WS on","ok")};ws.onclose=function(){setClass(wsEl,"WS off","bad");rtimer=setTimeout(connect,2500)};ws.onerror=function(){setClass(wsEl,"WS err","bad")};ws.onmessage=function(ev){var d=String(ev.data||"");if(d.indexOf("{\"telnet\"")===0){try{var j=JSON.parse(d);setClass(tnEl,j.telnet?"Telnet on":"Telnet off",j.telnet?"ok":"bad");return}catch(e){}}if(d.indexOf("#TELNET:")===0){var on=d.toLowerCase().indexOf("connected")>0;setClass(tnEl,on?"Telnet on":"Telnet off",on?"ok":"bad");return}d.split(/\n/).forEach(addLine)}}
