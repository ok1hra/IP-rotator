		.pwmbarwrap{

		.pwmbarmask{
			height: 100%;

			border-radius: 0;
			background:
				repeating-linear-gradient(
					90deg,

		.pwmbarfill{

	<body>

	<div style="position: relative;">
		<canvas class="mouse" id="Mouse" height="600" width="600"></canvas>
		<canvas class="top" id="Azimuth" width="600" height="600">Your browser does not support the HTML5 canvas tag.</canvas>

		<canvas class="bot" id="Map" width="600" height="600"></canvas>

		<div class="zoomctl" id="MapZoomControl">

			<input class="dxccsearchinput" type="text" id="MapDxccSearchInput" list="MapDxccSearchList" placeholder="e.g. OK, DL, JA" autocomplete="off" spellcheck="false">

			</label>
			<label class="togglelabel" for="MapDxccToggle" id="MapDxccToggleLabel">

			<p style="font-size: 25px; color: #ccc; margin: 20 0 0 0; text-align: center;">
				<span class="statuspill">
					<span class="statuspillmain">
						<span style="color: #fff;" id="AntName2"> </span>&nbsp;| POE
						<span style="color: #fff; font-weight: bold;" id="ADCValue">0</span> V |
						 raw <span style="font-weight: bold;" id="AZValue">0</span>&deg; |
					</span>
					<a class="setupbtn" href="/set" onclick="window.open( this.href, this.href, 'width=700,height=710,left=0,top=0,menubar=no,location=no,status=no' ); return false;">SETUP</a>
				</span>
				<br>
				<span style="color: #666; font-size: 73%" id="mac"> </span><span id="MapModeInfo" style="color: #666; font-size: 73%"></span><span id="NtpStatus" style="color: #666; font-size: 73%"></span><span id="ReleaseStatus" style="color: #666; font-size: 73%"></span><span id="OnlineStatus" style="color: #666; font-size: 73%"></span>
			</p>

	<script>
	var BoxSize = 600;
	var Target  = 0;
	var AzShift = 0;
	var AzRange = 0;
	var Azimuth = 0;
	var AzimuthTmp = 0;
	var AntRadiationAngle = 0;
	var Status = 4;
	var StatusTmp = 0;
	var MapSource = -1;
	var MapUrl = 0;
	var MapLocator = "JO60UC";
	var MapZoomKm = 5000;
	var MapGraylineEnabled = true;
	var MapBordersEnabled = false;
	var MapDxccEnabled = false;
	var DegOverlayEnabled = true;
	var MapTheme = 1;
	var GraylineDarkness = 80;
	var GraylineEpoch = 0;
	var LastDxccRotateRequest = "";
	var LastDxccRotateAt = 0;
	var GraylineNtpOk = false;
	var GraylineMinuteKey = "";
	var AzimuthPulseStart = 0;
	var OnlineTimeStamp = 0;
	var Elevation = 0; 
	var MapZoomSaveTimer = 0;
	var FirmwareRev = "";
	var LatestReleaseTag = "";
	var ReleaseCheckDone = false;
	var DxccPrefixIndex = null;
	var PwmUiEnabled = false;
	var PwmMaxDuty = 255;
	var PwmActualDuty = 0;
	var PwmSaveTimer = 0;
	
	var Xcenter = BoxSize/2;
	var Ycenter = BoxSize/2;


	// setInterval(function.reload(){ map();}, 600000); //mSeconds update rate
	setInterval(function() { map();}, 600000); //mSeconds update rate
	setInterval(function() { getData();}, 500); //mSeconds update rate
	setInterval(function() { CheckOnline();}, 2000); //mSeconds update rate
	setInterval(function() { getGraylineInfo();}, 30000); // update UTC/NTP status for grayline
	setInterval(function() { checkLatestRelease();}, 21600000); // 6h release check
	getSet();
//	setTimeout(() => { map(); }, 1000);
	Static();
	StaticBot();
	var AZtarget = null;

	function CheckOnline() {
		if( new Date().getTime() - Number(OnlineTimeStamp) > 1500){
			document.getElementById("OnlineStatus").innerHTML = " | <span style='color: red;'>&#8226;</span> Offline";
		}else{
			document.getElementById("OnlineStatus").innerHTML = " | <span style='color: white;'>&#8226;</span> Connected";
		}
	}

	function updateMapModeInfo(){
		var info = document.getElementById("MapModeInfo");
		if(!info){ return; }
		info.innerHTML = "";
	}

	function isElevationVectorMode(){
		return Number(MapSource) === 1 && Number(Elevation) === 1;
	}

		function updatePageLayout(){
			var statusWrap = document.querySelector(".second");
			if(isElevationVectorMode()){
				document.body.style.minHeight = "580px";
				if(statusWrap){ statusWrap.style.top = "452px"; }
			}else{
				document.body.style.minHeight = "730px";
				if(statusWrap){ statusWrap.style.top = "620px"; }
			}
		}

	function updateMapZoomControl(){
		var wrap = document.getElementById("MapZoomControl");
		var slider = document.getElementById("MapZoomSlider");
		var value = document.getElementById("MapZoomValue");
		if(!wrap || !slider || !value){ return; }
		if(Number(MapSource) === 1 && Number(Elevation) !== 1){
			wrap.style.display = "block";
			slider.value = mapZoomKmToSliderValue(Number(MapZoomKm));
			value.innerHTML = String(MapZoomKm) + " km";
		}else{
			wrap.style.display = "none";
		}
	}

	function isBitmapAzimuthMode(){
		return Number(MapSource) === 0 && Number(Elevation) !== 1;
	}

	function shouldShowPwmControl(){
		return !!PwmUiEnabled && Number(Elevation) !== 1 && Number(MapSource) !== -1;
	}

	function Clamp(value, min, max) {
		if (value < min) { return min; }
		if (value > max) { return max; }
		return value;
	}

	function dutyToPercent(duty){
		return Math.round(Number(duty || 0) * 100 / 255);
	}

	function getPwmSegmentWidthPx(){
		return 9;
	}

	function snapPwmPercentToSegments(percent, totalWidthPx){
		if(Number(totalWidthPx) <= 0){
			return 0;
		}
		var clampedPercent = Clamp(Number(percent || 0), 0, 100);
		var widthPx = totalWidthPx * clampedPercent / 100;
		var segmentWidthPx = getPwmSegmentWidthPx();
		var segmentsLit = Math.floor(widthPx / segmentWidthPx);
		return Clamp(segmentsLit * segmentWidthPx / totalWidthPx * 100, 0, 100);
	}

	function updatePwmControl(){
		var wrap = document.getElementById("PwmControl");
		var slider = document.getElementById("PwmMaxSlider");
		var valueLabel = document.getElementById("PwmValue");
		var barMask = document.getElementById("PwmBarMask");
		var barFill = document.getElementById("PwmBarFill");
		if(!wrap || !slider || !valueLabel || !barMask || !barFill){ return; }
		if(shouldShowPwmControl()){
			wrap.style.display = "block";
			if(isBitmapAzimuthMode()){
				wrap.classList.add("bitmapoverlay");
			}else{
				wrap.classList.remove("bitmapoverlay");
			}
			slider.value = Number(PwmMaxDuty);
			valueLabel.innerHTML = String(dutyToPercent(PwmMaxDuty)) + "%";
			var totalWidthPx = barMask.parentElement ? Number(barMask.parentElement.clientWidth || 0) : 0;
			if(totalWidthPx <= 0){
				totalWidthPx = Number(wrap.clientWidth || 1);
			}
			var maxWidth = Clamp(Number(PwmMaxDuty) / 255 * 100, 0, 100);
			var actualWithinMax = 0;
			if(Number(PwmMaxDuty) > 0){
				actualWithinMax = Clamp(Number(PwmActualDuty) / Number(PwmMaxDuty) * 100, 0, 100);
			}
			maxWidth = snapPwmPercentToSegments(maxWidth, totalWidthPx);
			actualWithinMax = snapPwmPercentToSegments(actualWithinMax, totalWidthPx * maxWidth / 100);
			barMask.style.width = String(maxWidth) + "%";
			barFill.style.width = String(actualWithinMax) + "%";
		}else{
			wrap.style.display = "none";
			wrap.classList.remove("bitmapoverlay");
		}
	}

	function persistPwmMaxDuty(){
		if(!PwmUiEnabled){
			return;
		}
		var http = new XMLHttpRequest();
		http.open("GET", "setPwmMaxDuty?value=" + encodeURIComponent(String(PwmMaxDuty)), true);
		http.send();
	}

	function schedulePwmMaxDutySave(){
		if(PwmSaveTimer){
			clearTimeout(PwmSaveTimer);
		}
		PwmSaveTimer = setTimeout(function(){
			PwmSaveTimer = 0;
			persistPwmMaxDuty();
		}, 250);
	}

	function updateMapDxccSearchControl(){
		var wrap = document.getElementById("MapDxccSearchControl");
		if(!wrap){ return; }
		if(Number(MapSource) === 1 && Number(Elevation) !== 1){
			wrap.style.display = "block";
			if(MapDatasetReady){
				updateDxccSearchSuggestions();
			}else{
				ensureMapDataset(function(){
					updateDxccSearchSuggestions();
				});
			}
		}else{
			wrap.style.display = "none";
		}
	}

	function updateMapBordersControl(){
		var wrap = document.getElementById("MapBordersControl");
		var degToggle = document.getElementById("MapDegToggle");
		var graylineToggle = document.getElementById("MapGraylineToggle");
		var graylineLabel = document.getElementById("MapGraylineToggleLabel");
		var toggle = document.getElementById("MapBordersToggle");
		var bordersLabel = document.getElementById("MapBordersToggleLabel");
		var dxccToggle = document.getElementById("MapDxccToggle");
		var dxccLabel = document.getElementById("MapDxccToggleLabel");
		if(!wrap || !degToggle || !graylineToggle || !graylineLabel || !toggle || !bordersLabel || !dxccToggle || !dxccLabel){ return; }
		if(Number(Elevation) !== 1){
			wrap.style.display = "block";
			degToggle.checked = !!DegOverlayEnabled;
			var mapOptionsVisible = Number(MapSource) === 1;
			graylineLabel.style.display = mapOptionsVisible ? "flex" : "none";
			bordersLabel.style.display = mapOptionsVisible ? "flex" : "none";
			dxccLabel.style.display = mapOptionsVisible ? "flex" : "none";
			graylineToggle.checked = !!MapGraylineEnabled;
			toggle.checked = !!MapBordersEnabled;
			dxccToggle.checked = !!MapDxccEnabled;
		}else{
			wrap.style.display = "none";
		}
	}

	function setDegOverlayEnabled(enabled){
		DegOverlayEnabled = !!enabled;
		updateMapBordersControl();

	function persistMapZoom(){

		http.open("GET", "setMapZoomKm?value=" + encodeURIComponent(String(MapZoomKm)), true);

	function persistMapLocator(newLocator, onDone){
		if(Number(MapSource) !== 1 || Number(Elevation) === 1){
			if(onDone){ onDone(false); }
			return;
		}
		var locator = String(newLocator || "").trim().toUpperCase();
		if(!/^[A-R]{2}[0-9]{2}[A-X]{2}$/.test(locator)){
			if(onDone){ onDone(false); }
			return;
		}
		var http = new XMLHttpRequest();
		http.onreadystatechange = function() {
			if (this.readyState !== 4) {
				return;
			}
			if (this.status === 200) {
				MapLocator = String(this.responseText || locator).trim().toUpperCase();
				updateMapModeInfo();
				map();
				if(onDone){ onDone(true, MapLocator); }
			}else{
				if(onDone){ onDone(false); }
			}
		};
		http.open("GET", "setMapLocator?value=" + encodeURIComponent(locator), true);
		http.send();
	}

	function scheduleMapZoomSave(){
		if(MapZoomSaveTimer){
			clearTimeout(MapZoomSaveTimer);
		}
		MapZoomSaveTimer = setTimeout(function(){
			MapZoomSaveTimer = 0;
			persistMapZoom();
		}, 350);
	}

	function clampMapZoomKm(value){
		var zoomKm = Number(value);
		if(!isFinite(zoomKm)){
			zoomKm = 20000;
		}
		if(zoomKm < 1000){
			zoomKm = 1000;
		}
		if(zoomKm > 20000){
			zoomKm = 20000;
		}
		return zoomKm;
	}

	function mapZoomKmToSliderValue(zoomKm){
		return 21000 - clampMapZoomKm(zoomKm);
	}

	function sliderValueToMapZoomKm(sliderValue){
		return clampMapZoomKm(21000 - Number(sliderValue));
	}

	function applyMapZoom(nextZoomKm, persistNow){
		if (Number(MapSource) !== 1 || Number(Elevation) === 1) {
			return false;
		}
		var zoomKm = clampMapZoomKm(nextZoomKm);
		var changed = zoomKm !== Number(MapZoomKm);
		MapZoomKm = zoomKm;
		updateMapModeInfo();
		updateMapZoomControl();
		updateMapBordersControl();
		if (!changed) {
			return false;
		}
		map();
		if (persistNow) {
			persistMapZoom();
		} else {
			scheduleMapZoomSave();
		}
		return true;
	}

	function isPlusKey(evt){
		if(!evt){ return false; }
		return evt.key === "+" || evt.code === "NumpadAdd" || (evt.key === "=" && evt.shiftKey);
	}

	function isMinusKey(evt){
		if(!evt){ return false; }
		return evt.key === "-" || evt.key === "_" || evt.code === "NumpadSubtract";
	}

	function stepRangeFromPlusMinus(evt, onValueChanged){
		if(!evt || !evt.currentTarget){
			return;
		}
		var stepDir = 0;
		if(isPlusKey(evt)){
			stepDir = 1;
		}else if(isMinusKey(evt)){
			stepDir = -1;
		}
		if(stepDir === 0){
			return;
		}
		evt.preventDefault();
		var slider = evt.currentTarget;
		var before = Number(slider.value);
		if(stepDir > 0){
			slider.stepUp();
		}else{
			slider.stepDown();
		}
		if(Number(slider.value) === before){
			return;
		}
		if(typeof onValueChanged === "function"){
			onValueChanged.call(slider);
		}
	}

	function isEditableElement(el){
		if(!el){ return false; }
		var tag = String(el.tagName || "").toUpperCase();
		return tag === "INPUT" || tag === "TEXTAREA" || !!el.isContentEditable;
	}

	function getPlusMinusStepDir(evt){
		if(isPlusKey(evt)){ return 1; }
		if(isMinusKey(evt)){ return -1; }
		return 0;
	}

	function isPwmIncreaseKey(evt){
		if(!evt){ return false; }
		return evt.key === "]" || evt.key === "}" || evt.code === "BracketRight";
	}

	function isPwmDecreaseKey(evt){
		if(!evt){ return false; }
		return evt.key === "[" || evt.key === "{" || evt.code === "BracketLeft";
	}

	function getPwmStepDir(evt){
		if(isPwmIncreaseKey(evt)){ return 1; }
		if(isPwmDecreaseKey(evt)){ return -1; }
		return 0;
	}

	function changeMapZoomByStep(stepDir){
		if(stepDir === 0){ return false; }
		var slider = document.getElementById("MapZoomSlider");
		var step = slider ? Number(slider.step || 250) : 250;
		if(!(step > 0)){ step = 250; }
		return applyMapZoom(Number(MapZoomKm) - stepDir * step, true);
	}

	function changePwmByStep(stepDir){
		if(stepDir === 0 || !PwmUiEnabled){
			return false;
		}
		var slider = document.getElementById("PwmMaxSlider");
		if(!slider){
			return false;
		}
		var step = Number(slider.step || 5);
		var min = Number(slider.min || 0);
		var max = Number(slider.max || 255);
		if(!(step > 0)){ step = 5; }
		var next = Clamp(Number(PwmMaxDuty) + stepDir * step, min, max);
		if(next === Number(PwmMaxDuty)){
			return false;
		}
		PwmMaxDuty = next;
		updatePwmControl();
		persistPwmMaxDuty();
		return true;
	}

	function toggleShortcutOption(keyLower){
		if(Number(Elevation) === 1){
			return false;
		}
		if(keyLower === "d"){
			setDegOverlayEnabled(!DegOverlayEnabled);
			return true;
		}
		if(Number(MapSource) !== 1){
			return false;
		}
		if(keyLower === "g"){
			setMapGraylineEnabled(!MapGraylineEnabled);
			return true;
		}
		if(keyLower === "s"){
			setMapBordersEnabled(!MapBordersEnabled);
			return true;
		}
		if(keyLower === "x"){
			setMapDxccEnabled(!MapDxccEnabled);
			return true;
		}
		if(keyLower === "t"){
			var dxccSearchInput = document.getElementById("MapDxccSearchInput");
			if(!dxccSearchInput || dxccSearchInput.offsetParent === null){
				return false;
			}
			if(document.activeElement === dxccSearchInput){
				dxccSearchInput.blur();
			}else{
				dxccSearchInput.focus();
				dxccSearchInput.select();
			}
			return true;
		}
		return false;
	}

	function handleGlobalKeyboardShortcuts(evt){
		if(!evt || evt.ctrlKey || evt.metaKey || evt.altKey){
			return;
		}
		var key = String(evt.key || "");
		var keyLower = key.toLowerCase();
		if(isEditableElement(evt.target)){
			return;
		}
		if(key === "p"){
			if(changePwmByStep(-1)){
				evt.preventDefault();
			}
			return;
		}
		if(key === "P"){
			if(changePwmByStep(1)){
				evt.preventDefault();
			}
			return;
		}
		var pwmStepDir = getPwmStepDir(evt);
		if(pwmStepDir !== 0){
			if(changePwmByStep(pwmStepDir)){
				evt.preventDefault();
			}
			return;
		}
		if(toggleShortcutOption(keyLower)){
			evt.preventDefault();
			return;
		}
		var stepDir = getPlusMinusStepDir(evt);
		if(stepDir !== 0){
			if(changeMapZoomByStep(stepDir)){
				evt.preventDefault();
			}
		}
	}

	function initKeyboardShortcutHints(){
		var hints = document.querySelectorAll(".kbdhint");
		for(var i = 0; i < hints.length; i++){
			var el = hints[i];
			var explicitShortcut = String(el.getAttribute("data-shortcut") || "").trim();
			var keyText = String(el.textContent || "").trim().toUpperCase();
			if(!keyText && !explicitShortcut){
				continue;
			}
			var shortcutText = explicitShortcut || keyText;
			el.setAttribute("title", "Shortcut: " + shortcutText);
			el.setAttribute("aria-label", "Keyboard shortcut " + shortcutText);
		}
	}

	function degToRad(deg){
		return deg * Math.PI / 180;
	}

	function normalizeLonDiffRad(lonDiff){
		while(lonDiff > Math.PI){ lonDiff -= 2 * Math.PI; }
		while(lonDiff < -Math.PI){ lonDiff += 2 * Math.PI; }
		return lonDiff;
	}

	function maidenheadToLatLon(locator){
		if(!locator){ return null; }
		var loc = String(locator).trim().toUpperCase();
		if(!/^[A-R]{2}[0-9]{2}[A-X]{2}$/.test(loc)){ return null; }
		var lon = (loc.charCodeAt(0) - 65) * 20 - 180;
		lon += (loc.charCodeAt(2) - 48) * 2;
		lon += (loc.charCodeAt(4) - 65) * (5/60);
		lon += 2.5/60;
		var lat = (loc.charCodeAt(1) - 65) * 10 - 90;
		lat += (loc.charCodeAt(3) - 48) * 1;
		lat += (loc.charCodeAt(5) - 65) * (2.5/60);
		lat += 1.25/60;
		return {lat: lat, lon: lon};
	}

	function latLonToMaidenhead(latDeg, lonDeg, precision){
		var lon = Number(lonDeg);
		var lat = Number(latDeg);
		if(!isFinite(lat) || !isFinite(lon)){ return ""; }
		while(lon < -180){ lon += 360; }
		while(lon >= 180){ lon -= 360; }
		if(lat > 89.999999){ lat = 89.999999; }
		if(lat < -89.999999){ lat = -89.999999; }
		var lonAdj = lon + 180;
		var latAdj = lat + 90;
		var fieldLon = Math.floor(lonAdj / 20);
		var fieldLat = Math.floor(latAdj / 10);
		var locator = String.fromCharCode(65 + fieldLon) + String.fromCharCode(65 + fieldLat);
		lonAdj -= fieldLon * 20;
		latAdj -= fieldLat * 10;
		var squareLon = Math.floor(lonAdj / 2);
		var squareLat = Math.floor(latAdj / 1);
		locator += String(squareLon) + String(squareLat);
		if(Number(precision) >= 6){
			lonAdj -= squareLon * 2;
			latAdj -= squareLat * 1;
			var subLon = Math.floor(lonAdj / (5/60));
			var subLat = Math.floor(latAdj / (2.5/60));
			if(subLon > 23){ subLon = 23; }
			if(subLat > 23){ subLat = 23; }
			locator += String.fromCharCode(65 + subLon) + String.fromCharCode(65 + subLat);
		}
		return locator;
	}

	function projectAzimuthal(latDeg, lonDeg, centerLatDeg, centerLonDeg, mapRadiusPx, zoomKm){
		var phi1 = degToRad(centerLatDeg);
		var lam1 = degToRad(centerLonDeg);
		var phi = degToRad(latDeg);
		var lam = degToRad(lonDeg);
		var dLam = normalizeLonDiffRad(lam - lam1);

		var cosc = Math.sin(phi1) * Math.sin(phi) + Math.cos(phi1) * Math.cos(phi) * Math.cos(dLam);
		if(cosc > 1){ cosc = 1; }
		if(cosc < -1){ cosc = -1; }
		var c = Math.acos(cosc);
		var distKm = EARTH_RADIUS_KM * c;
		if(distKm > zoomKm){ return null; }

		var theta = 0;
		if(c > 1e-9){
			theta = Math.atan2(
				Math.sin(dLam) * Math.cos(phi),
				Math.cos(phi1) * Math.sin(phi) - Math.sin(phi1) * Math.cos(phi) * Math.cos(dLam)
			);
		}

		var r = (distKm / zoomKm) * mapRadiusPx;
		return {
			x: Xcenter + Math.sin(theta) * r,
			y: Ycenter - Math.cos(theta) * r
		};
	}

	function drawGeoLineCollection(ctx, lines, centerLat, centerLon, mapRadiusPx, zoomKm, strokeStyle, lineWidth){
		ctx.strokeStyle = strokeStyle;
		ctx.lineWidth = lineWidth;
		for(var i=0; i<lines.length; i++){
			var line = lines[i];
			var opened = false;
			var prev = null;
			for(var j=0; j<line.length; j++){
				var p = projectAzimuthal(line[j][0] / 100, line[j][1] / 100, centerLat, centerLon, mapRadiusPx, zoomKm);
				if(!p){
					if(opened){
						ctx.stroke();
						opened = false;
					}
					prev = null;
					continue;
				}
				if(!opened){
					ctx.beginPath();
					ctx.moveTo(p.x, p.y);
					opened = true;
				}else{
					// avoid connecting through clipped edge with unrealistically long segment
					if(prev && Math.hypot(p.x - prev.x, p.y - prev.y) > mapRadiusPx * 0.8){
						ctx.stroke();
						ctx.beginPath();
						ctx.moveTo(p.x, p.y);
					}else{
						ctx.lineTo(p.x, p.y);
					}
				}
				prev = p;
			}
			if(opened){
				ctx.stroke();
			}
		}
	}

	function normalizePrefixQuery(value){

		var firstToken = text.split(/\s+/)[0];

	function ensureDxccPrefixIndex(){
		if(DxccPrefixIndex){ return DxccPrefixIndex; }
		DxccPrefixIndex = {};
		for(var i=0; i<DXCC_PREFIX_LABELS.length; i++){
			var row = DXCC_PREFIX_LABELS[i];
			var prefix = String(row[2] || "").toUpperCase();
			if(!prefix){ continue; }
			var area = Number(row[3] || 0);
			if(!DxccPrefixIndex[prefix] || area > Number(DxccPrefixIndex[prefix].area || 0)){
				DxccPrefixIndex[prefix] = {
					label: prefix,
					lat: row[0] / 100,
					lon: row[1] / 100,
					area: area,
					name: row[4] || prefix
				};
			}
		}
		return DxccPrefixIndex;
	}

	function updateDxccSearchSuggestions(query){
		var list = document.getElementById("MapDxccSearchList");
		if(!list || !MapDatasetReady){ return; }
		var normalized = normalizePrefixQuery(query);
		if(!normalized){
			list.innerHTML = "";
			setDxccSearchStatus("");
			return;
		}
		var prefixIndex = ensureDxccPrefixIndex();
		var prefixes = Object.keys(prefixIndex).sort();
		var limit = 16;
		var html = [];
		for(var i=0; i<prefixes.length; i++){
			var prefix = prefixes[i];
			if(normalized && prefix.indexOf(normalized) !== 0){
				continue;
			}
			html.push("<option value='" + prefix + "'>");
			if(html.length >= limit){
				break;
			}
		}
		list.innerHTML = html.join("");
		setDxccSearchStatus(html.length > 0 ? "Select prefix or press Enter" : "No prefix match", html.length === 0);
	}

	function bearingDegrees(lat1Deg, lon1Deg, lat2Deg, lon2Deg){
		var lat1 = degToRad(lat1Deg);
		var lat2 = degToRad(lat2Deg);
		var dLon = degToRad(lon2Deg - lon1Deg);
		var y = Math.sin(dLon) * Math.cos(lat2);
		var x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
		var bearing = Math.atan2(y, x) * 180 / Math.PI;
		while(bearing < 0){ bearing += 360; }
		while(bearing >= 360){ bearing -= 360; }
		return Math.round(bearing);
	}

	function rotateToAzimuth(targetAzimuth, onDone){
		var azimuth = Math.round(Number(targetAzimuth));
		if(!isFinite(azimuth)){
			if(onDone){ onDone(false, "Invalid azimuth"); }
			return;
		}
		var http = new XMLHttpRequest();
		http.open('POST', '/', true);
		http.setRequestHeader('Content-type', 'application/x-www-form-urlencoded');
		http.onreadystatechange = function() {
			if(http.readyState !== 4){
				return;
			}
			if(http.status === 200){
				if(onDone){ onDone(true, http.responseText); }
			}else{
				if(onDone){ onDone(false, http.responseText); }
			}
		};
		http.send("ROT=" + azimuth);
	}

	function maybeRotateToDxccPrefixFromSuggestion(evt){
		if(!evt || !MapDatasetReady){
			return;
		}
		var inputType = String(evt.inputType || "");
		if(inputType !== "insertReplacementText"){
			return;
		}
		var normalized = normalizePrefixQuery(evt.target && evt.target.value);
		if(!normalized){
			return;
		}
		var entry = ensureDxccPrefixIndex()[normalized];
		if(!entry || isDuplicateDxccRotate(normalized)){
			return;
		}
		rotateToDxccPrefix(normalized);
	}

	function rotateToDxccPrefix(query){
		if(Number(MapSource) !== 1 || Number(Elevation) === 1){
			return;
		}
		if(!MapDatasetReady){
			ensureMapDataset(function(){
				rotateToDxccPrefix(query);
			});
			return;
		}
		var normalized = normalizePrefixQuery(query);
		if(!normalized){
			setDxccSearchStatus("Type DXCC prefix", true);
			return;
		}
		var prefixIndex = ensureDxccPrefixIndex();
		var entry = prefixIndex[normalized];
		if(!entry){
			updateDxccSearchSuggestions(normalized);
			return;
		}
		var center = getMapCenterLatLon();
		if(!center){
			setDxccSearchStatus("Map center unavailable", true);
			return;
		}
		var azimuth = bearingDegrees(center.lat, center.lon, entry.lat, entry.lon);
		var entryName = entry.name ? " " + entry.name : "";
		var dxccSearchInput = document.getElementById("MapDxccSearchInput");
		rememberDxccRotate(normalized);
		setTargetAzimuth(azimuth);
		if(dxccSearchInput){
			dxccSearchInput.value = "";
			updateDxccSearchSuggestions("");
		}
		setDxccSearchStatus("Rotating to " + normalized + entryName + " (" + azimuth + "°)");
		rotateToAzimuth(azimuth, function(ok, responseText){
			if(ok){
				setDxccSearchStatus("Rotating to " + normalized + entryName + " (" + azimuth + "°)");
			}else{
				setDxccSearchStatus(responseText || "Rotate request failed", true);
			}
		});
	}

	function drawDxccPrefixes(ctx, centerLat, centerLon, mapRadiusPx, zoomKm){
		if(!MapDxccEnabled || !DXCC_PREFIX_LABELS || DXCC_PREFIX_LABELS.length === 0){
			return;
		}
		var fontSize = zoomKm <= 3500 ? 12 : (zoomKm <= 8000 ? 11 : 10);
		var maxLabels = zoomKm <= 3500 ? 82 : (zoomKm <= 8000 ? 68 : (zoomKm <= 14000 ? 34 : 22));
		var candidates = [];
		for(var i=0; i<DXCC_PREFIX_LABELS.length; i++){
			var row = DXCC_PREFIX_LABELS[i];
			var p = projectAzimuthal(row[0] / 100, row[1] / 100, centerLat, centerLon, mapRadiusPx, zoomKm);
			if(!p){
				continue;
			}
			candidates.push({
				x: p.x,
				y: p.y,
				label: row[2],
				area: Number(row[3] || 0)
			});
		}
		if(zoomKm <= 8000){
			for(var s=0; s<STATE_ABBR_LABELS.length; s++){
				var stateRow = STATE_ABBR_LABELS[s];
				var sp = projectAzimuthal(stateRow[0] / 100, stateRow[1] / 100, centerLat, centerLon, mapRadiusPx, zoomKm);
				if(!sp){
					continue;
				}
				candidates.push({
					x: sp.x,
					y: sp.y,
					label: stateRow[2],
					area: Number(stateRow[3] || 0),
					isState: true
				});
			}
		}
		candidates.sort(function(a, b){
			if(b.area !== a.area){ return b.area - a.area; }
			return String(a.label).length - String(b.label).length;
		});

		ctx.save();
		ctx.beginPath();
		ctx.arc(Xcenter, Ycenter, mapRadiusPx, 0, 2 * Math.PI);
		ctx.clip();
		ctx.font = "600 " + String(fontSize) + "px 'Roboto Condensed',sans-serif";
		ctx.textAlign = "center";
		ctx.textBaseline = "middle";

		var placed = [];
		for(var j=0; j<candidates.length; j++){
			if(placed.length >= maxLabels){
				break;
			}
			var item = candidates[j];
			var metrics = ctx.measureText(item.label);
			var boxW = Math.ceil(metrics.width) + 8;
			var boxH = fontSize + 6;
			var rect = {
				left: item.x - boxW / 2,
				top: item.y - boxH / 2,
				right: item.x + boxW / 2,
				bottom: item.y + boxH / 2
			};
			var collides = false;
			for(var k=0; k<placed.length; k++){
				if(labelRectsOverlap(rect, placed[k])){
					collides = true;
					break;
				}
			}
			if(collides){
				continue;
			}
			placed.push(rect);
			ctx.fillStyle = item.isState ? "#ffd36a" : "rgba(5, 8, 11, 0.62)";
			ctx.fillRect(rect.left, rect.top, boxW, boxH);
			ctx.fillStyle = item.isState ? "rgba(8, 10, 12, 0.94)" : "#ffd36a";
			ctx.fillText(item.label, item.x, item.y + 0.5);
		}
		ctx.restore();
	}

	var locatorSvgImg = null;
	var locatorSvgLastKey = "";
	var locatorSvgLoadingKey = "";
	var locatorFillCacheCanvas = null;
	var locatorFillCacheKey = "";
	var LAND_META = null;

	function projectGeoSegments(lines, centerLat, centerLon, mapRadiusPx, zoomKm){
		var allSegments = [];
		for(var i=0; i<lines.length; i++){
			var line = lines[i];
			var segments = [];
			var segment = [];
			var prev = null;
			for(var j=0; j<line.length; j++){
				var p = projectAzimuthal(line[j][0] / 100, line[j][1] / 100, centerLat, centerLon, mapRadiusPx, zoomKm);
				if(!p){
					if(segment.length > 1){
						segments.push(segment);
					}
					segment = [];
					prev = null;
					continue;
				}
				if(prev && Math.hypot(p.x - prev.x, p.y - prev.y) > mapRadiusPx * 0.8){
					if(segment.length > 1){
						segments.push(segment);
					}
					segment = [];
				}
				segment.push(p);
				prev = p;
			}
			if(segment.length > 1){
				segments.push(segment);
			}
			if(segments.length > 0){
				allSegments.push(segments);
			}
		}
		return allSegments;
	}

	function svgPathFromSegments(allSegments){
		var d = "";
		for(var i=0; i<allSegments.length; i++){
			var segments = allSegments[i];
			for(var j=0; j<segments.length; j++){
				var segment = segments[j];
				for(var k=0; k<segment.length; k++){
					var p = segment[k];
					var x = Math.round(p.x * 10) / 10;
					var y = Math.round(p.y * 10) / 10;
					if(k===0){
						d += "M" + x + " " + y;
					}else{
						d += " L" + x + " " + y;
					}
				}
			}
		}
		return d;
	}

	function projectAzimuthalRaw(latDeg, lonDeg, centerLatDeg, centerLonDeg, mapRadiusPx, zoomKm){
		var phi1 = degToRad(centerLatDeg);
		var lam1 = degToRad(centerLonDeg);
		var phi = degToRad(latDeg);
		var lam = degToRad(lonDeg);
		var dLam = normalizeLonDiffRad(lam - lam1);

		var cosc = Math.sin(phi1) * Math.sin(phi) + Math.cos(phi1) * Math.cos(phi) * Math.cos(dLam);
		if(cosc > 1){ cosc = 1; }
		if(cosc < -1){ cosc = -1; }
		var c = Math.acos(cosc);
		var distKm = EARTH_RADIUS_KM * c;

		var theta = 0;
		if(c > 1e-9){
			theta = Math.atan2(
				Math.sin(dLam) * Math.cos(phi),
				Math.cos(phi1) * Math.sin(phi) - Math.sin(phi1) * Math.cos(phi) * Math.cos(dLam)
			);
		}
		var r = (distKm / zoomKm) * mapRadiusPx;
		return {
			x: Xcenter + Math.sin(theta) * r,
			y: Ycenter - Math.cos(theta) * r
		};
	}

	function buildCircleClipPolygon(mapRadiusPx, segments){
		var poly = [];
		var n = segments || 96;
		for(var i=0; i<n; i++){
			var a = (2 * Math.PI * i) / n;
			poly.push({
				x: Xcenter + Math.cos(a) * mapRadiusPx,
				y: Ycenter - Math.sin(a) * mapRadiusPx
			});
		}
		return poly;
	}

	function cross2(ax, ay, bx, by){
		return ax * by - ay * bx;
	}

	function polygonSignedArea(poly){
		var s = 0;
		for(var i=0; i<poly.length; i++){
			var p = poly[i];
			var q = poly[(i + 1) % poly.length];
			s += p.x * q.y - q.x * p.y;
		}
		return s * 0.5;
	}

	function isInsideClipEdge(p, a, b, clipOrientation){
		var eps = 1e-7;
		var side = cross2(b.x - a.x, b.y - a.y, p.x - a.x, p.y - a.y);
		return (clipOrientation * side) >= -eps;
	}

	function lineIntersectionWithClipEdge(p1, p2, a, b){
		var dx = p2.x - p1.x;
		var dy = p2.y - p1.y;
		var ex = b.x - a.x;
		var ey = b.y - a.y;
		var denom = cross2(dx, dy, ex, ey);
		if(Math.abs(denom) < 1e-12){
			return {x: p2.x, y: p2.y};
		}
		var t = cross2(a.x - p1.x, a.y - p1.y, ex, ey) / denom;
		return {
			x: p1.x + t * dx,
			y: p1.y + t * dy
		};
	}

	function clipPolygonWithConvex(subject, clipPoly){
		var output = subject.slice();
		var clipOrientation = polygonSignedArea(clipPoly) >= 0 ? 1 : -1;
		for(var i=0; i<clipPoly.length; i++){
			var a = clipPoly[i];
			var b = clipPoly[(i + 1) % clipPoly.length];
			var input = output.slice();
			output = [];
			if(input.length === 0){
				break;
			}
			var s = input[input.length - 1];
			for(var j=0; j<input.length; j++){
				var e = input[j];
				var eInside = isInsideClipEdge(e, a, b, clipOrientation);
				var sInside = isInsideClipEdge(s, a, b, clipOrientation);

				if(eInside){
					if(!sInside){
						output.push(lineIntersectionWithClipEdge(s, e, a, b));
					}
					output.push(e);
				}else if(sInside){
					output.push(lineIntersectionWithClipEdge(s, e, a, b));
				}
				s = e;
			}
		}
		return output;
	}

	function buildClippedLandPolygons(centerLat, centerLon, mapRadiusPx, zoomKm){
		var clipPoly = buildCircleClipPolygon(mapRadiusPx, 96);
		var out = [];
		for(var i=0; i<LAND_OUTLINES.length; i++){
			var line = LAND_OUTLINES[i];
			if(!line || line.length < 3){
				continue;
			}
			var poly = [];
			for(var j=0; j<line.length; j++){
				poly.push(projectAzimuthalRaw(line[j][0] / 100, line[j][1] / 100, centerLat, centerLon, mapRadiusPx, zoomKm));
			}
			var clipped = clipPolygonWithConvex(poly, clipPoly);
			if(clipped.length >= 3){
				out.push(clipped);
			}
		}
		return out;
	}

	function svgClosedPathFromSegments(allSegments){
		var d = "";
		for(var i=0; i<allSegments.length; i++){
			var segments = allSegments[i];
			for(var j=0; j<segments.length; j++){
				var segment = segments[j];
				if(!segment || segment.length < 3){
					continue;
				}
				for(var k=0; k<segment.length; k++){
					var p = segment[k];
					var x = Math.round(p.x * 10) / 10;
					var y = Math.round(p.y * 10) / 10;
					if(k===0){
						d += "M" + x + " " + y;
					}else{
						d += " L" + x + " " + y;
					}
				}
				d += " Z";
			}
		}
		return d;
	}

	function buildLocatorSvg(centerLat, centerLon, mapRadiusPx, zoomKm){
		var theme = getMapThemeStyle();
		var landSegments = projectGeoSegments(LAND_OUTLINES, centerLat, centerLon, mapRadiusPx, zoomKm);
		var borderSegments = MapBordersEnabled ? projectGeoSegments(COUNTRY_BORDERS, centerLat, centerLon, mapRadiusPx, zoomKm) : [];
		var landPath = svgPathFromSegments(landSegments);
		var landFillPath = svgClosedPathFromSegments(landSegments);
		var borderPath = svgPathFromSegments(borderSegments);
		var circleR = Math.round(mapRadiusPx * 10) / 10;

		var svg = "";
		svg += "<svg xmlns='http://www.w3.org/2000/svg' width='" + BoxSize + "' height='" + BoxSize + "' viewBox='0 0 " + BoxSize + " " + BoxSize + "'>";
		svg += "<rect width='100%' height='100%' fill='#000'/>";
		svg += buildMapBackgroundSvg(theme, circleR);
		svg += "<g clip-path='url(#mapclip)'>";
		svg += "<rect width='100%' height='100%' fill='url(#mapbggrad)'/>";
		for(var ring = 1; ring <= 4; ring++){
			var rr = Math.round((circleR * ring / 4) * 10) / 10;
			svg += "<circle cx='" + Xcenter + "' cy='" + Ycenter + "' r='" + rr + "' fill='none' stroke='" + theme.ring + "' stroke-width='1'/>";
		}
		if(LocatorLandFillMode && landFillPath.length>0){
			svg += "<path d='" + landFillPath + "' fill='" + theme.landFill + "' stroke='none' fill-rule='evenodd'/>";
		}else if(landPath.length>0){
			svg += "<path d='" + landPath + "' fill='none' stroke='" + theme.landStroke + "' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/>";
		}
		if(MapBordersEnabled && borderPath.length>0){
			svg += "<path d='" + borderPath + "' fill='none' stroke='" + theme.borderStroke + "' stroke-width='" + (theme.borderWidth || 1.0) + "' stroke-linecap='round' stroke-linejoin='round'/>";
		}
		svg += "</g></svg>";
		return svg;
	}

	function ensureLandMeta(){
		if(LAND_META){ return; }
		LAND_META = [];
		for(var i=0; i<LAND_OUTLINES.length; i++){
			var line = LAND_OUTLINES[i];
			if(!line || line.length < 3){
				continue;
			}
			var latMin = 999999;
			var latMax = -999999;
			for(var j=0; j<line.length; j++){
				var lat = line[j][0];
				if(lat < latMin){ latMin = lat; }
				if(lat > latMax){ latMax = lat; }
			}
			LAND_META.push({
				ring: line,
				latMin: latMin,
				latMax: latMax
			});
		}
	}

	function normalizeLonAroundRef(lonDeg, refLonDeg){
		var lon = lonDeg;
		while(lon - refLonDeg > 180){ lon -= 360; }
		while(lon - refLonDeg < -180){ lon += 360; }
		return lon;
	}

	function pointInRingLatLon(latDeg, lonDeg, ring){
		var inside = false;
		for(var i=0, j=ring.length - 1; i<ring.length; j=i++){
			var yi = ring[i][0] / 100;
			var yj = ring[j][0] / 100;
			var xi = normalizeLonAroundRef(ring[i][1] / 100, lonDeg);
			var xj = normalizeLonAroundRef(ring[j][1] / 100, lonDeg);
			var intersects = ((yi > latDeg) !== (yj > latDeg)) &&
				(lonDeg < ((xj - xi) * (latDeg - yi) / ((yj - yi) || 1e-12) + xi));
			if(intersects){
				inside = !inside;
			}
		}
		return inside;
	}

	function isLandLatLon(latDeg, lonDeg){
		ensureLandMeta();
		var inside = false;
		var latScaled = Math.round(latDeg * 100);
		for(var i=0; i<LAND_META.length; i++){
			var meta = LAND_META[i];
			if(latScaled < meta.latMin || latScaled > meta.latMax){
				continue;
			}
			if(pointInRingLatLon(latDeg, lonDeg, meta.ring)){
				inside = !inside;
			}
		}
		return inside;
	}

	function inverseProjectAzimuthal(x, y, centerLatDeg, centerLonDeg, mapRadiusPx, zoomKm){
		var dx = x - Xcenter;
		var dy = Ycenter - y;
		var rho = Math.hypot(dx, dy);
		if(rho > mapRadiusPx){
			return null;
		}
		if(rho < 1e-9){
			return {lat: centerLatDeg, lon: centerLonDeg};
		}

		var phi1 = degToRad(centerLatDeg);
		var lam1 = degToRad(centerLonDeg);
		var c = (rho / mapRadiusPx) * (zoomKm / EARTH_RADIUS_KM);
		var sinC = Math.sin(c);
		var cosC = Math.cos(c);

		var phi = Math.asin(cosC * Math.sin(phi1) + (dy * sinC * Math.cos(phi1) / rho));
		var lam = lam1 + Math.atan2(
			dx * sinC,
			rho * Math.cos(phi1) * cosC - dy * Math.sin(phi1) * sinC
		);

		var lat = phi * 180 / Math.PI;
		var lon = lam * 180 / Math.PI;
		while(lon > 180){ lon -= 360; }
		while(lon < -180){ lon += 360; }
		return {lat: lat, lon: lon};
	}

	function normalizeDegrees(angle){
		var a = angle;
		while(a > 180){ a -= 360; }
		while(a < -180){ a += 360; }
		return a;
	}

	function julianDayFromUnix(epochSec){
		return (epochSec / 86400) + 2440587.5;
	}

	function normalize360(angle){
		var a = angle % 360;
		if(a < 0){ a += 360; }
		return a;
	}

	function getSubsolarPoint(epochSec){
		var jd = julianDayFromUnix(epochSec);
		var n = jd - 2451545.0;
		var L = (280.460 + 0.9856474 * n) % 360;
		if(L < 0){ L += 360; }
		var g = (357.528 + 0.9856003 * n) % 360;
		if(g < 0){ g += 360; }
		var gRad = degToRad(g);
		var lambda = L + 1.915 * Math.sin(gRad) + 0.020 * Math.sin(2 * gRad);
		var lambdaRad = degToRad(lambda);
		var epsilon = 23.439 - 0.0000004 * n;
		var epsilonRad = degToRad(epsilon);
		var declRad = Math.asin(Math.sin(epsilonRad) * Math.sin(lambdaRad));
		var raRad = Math.atan2(Math.cos(epsilonRad) * Math.sin(lambdaRad), Math.cos(lambdaRad));
		var raDeg = raRad * 180 / Math.PI;
		var gmst = (280.46061837 + 360.98564736629 * (jd - 2451545.0)) % 360;
		if(gmst < 0){ gmst += 360; }
		return {
			lat: declRad * 180 / Math.PI,
			lon: normalizeDegrees(raDeg - gmst)
		};
	}

	function getSublunarPoint(epochSec){
		var d = julianDayFromUnix(epochSec) - 2451543.5;
		var N = normalize360(125.1228 - 0.0529538083 * d);
		var i = 5.1454;
		var w = normalize360(318.0634 + 0.1643573223 * d);
		var a = 60.2666;
		var e = 0.054900;
		var M = normalize360(115.3654 + 13.0649929509 * d);

		var MRad = degToRad(M);
		var E = M + (180 / Math.PI) * e * Math.sin(MRad) * (1 + e * Math.cos(MRad));
		var ERad = degToRad(E);
		var xv = a * (Math.cos(ERad) - e);
		var yv = a * (Math.sqrt(1 - e * e) * Math.sin(ERad));
		var r = Math.hypot(xv, yv);
		var Ls = normalize360(280.460 + 0.9856474 * d);
		var Ms = normalize360(357.528 + 0.9856003 * d);
		var Lm = normalize360(N + w + M);
		var Dm = normalize360(Lm - Ls);
		var Ev = 1.2739 * Math.sin(degToRad(2 * Dm - M));
		var Ae = 0.1858 * Math.sin(degToRad(Ms));
		var A3 = 0.37 * Math.sin(degToRad(Ms));
		var MmP = M + Ev - Ae - A3;
		var Ec = 6.2886 * Math.sin(degToRad(MmP));
		var A4 = 0.214 * Math.sin(degToRad(2 * MmP));
		var lP = Lm + Ev + Ec - Ae + A4;
		var V = 0.6583 * Math.sin(degToRad(2 * (lP - Ls)));
		var lPP = lP + V;
		var NP = N - 0.16 * Math.sin(degToRad(Ms));
		var NRad = degToRad(NP);
		var iRad = degToRad(i);
		var wrv = degToRad(lPP - NP);
		var rr = (a * (1 - e * e)) / (1 + e * Math.cos(degToRad(MmP + Ec)));

		var xh = rr * (Math.cos(NRad) * Math.cos(wrv) - Math.sin(NRad) * Math.sin(wrv) * Math.cos(iRad));
		var yh = rr * (Math.sin(NRad) * Math.cos(wrv) + Math.cos(NRad) * Math.sin(wrv) * Math.cos(iRad));
		var zh = rr * (Math.sin(wrv) * Math.sin(iRad));

		var lonecl = Math.atan2(yh, xh);
		var latecl = Math.atan2(zh, Math.hypot(xh, yh));
		var ecl = degToRad(23.4393 - 3.563e-7 * d);

		var xe = Math.cos(lonecl) * Math.cos(latecl);
		var ye = Math.sin(lonecl) * Math.cos(latecl) * Math.cos(ecl) - Math.sin(latecl) * Math.sin(ecl);
		var ze = Math.sin(lonecl) * Math.cos(latecl) * Math.sin(ecl) + Math.sin(latecl) * Math.cos(ecl);

		var raDeg = normalize360(Math.atan2(ye, xe) * 180 / Math.PI);
		var decDeg = Math.atan2(ze, Math.hypot(xe, ye)) * 180 / Math.PI;
		var jd = julianDayFromUnix(epochSec);
		var gmst = normalize360(280.46061837 + 360.98564736629 * (jd - 2451545.0));
		return {
			lat: decDeg,
			lon: normalizeDegrees(raDeg - gmst)
		};
	}

	function solarAltitudeDeg(latDeg, lonDeg, subsolar){
		var latRad = degToRad(latDeg);
		var subLatRad = degToRad(subsolar.lat);
		var dLonRad = degToRad(normalizeDegrees(lonDeg - subsolar.lon));
		var sinAlt = Math.sin(latRad) * Math.sin(subLatRad) +
			Math.cos(latRad) * Math.cos(subLatRad) * Math.cos(dLonRad);
		if(sinAlt > 1){ sinAlt = 1; }
		if(sinAlt < -1){ sinAlt = -1; }
		return Math.asin(sinAlt) * 180 / Math.PI;
	}

	var graylineCacheCanvas = null;
	var graylineCacheKey = "";

	function drawCelestialPoint(ctx, body, centerLat, centerLon, mapRadiusPx, zoomKm, baseColor, coreColor, sizePx, glowColor){
		if(!body){
			return;
		}
		var p = projectAzimuthal(body.lat, body.lon, centerLat, centerLon, mapRadiusPx, zoomKm);
		if(!p){
			return;
		}
		ctx.save();
		ctx.beginPath();
		ctx.arc(Xcenter, Ycenter, mapRadiusPx, 0, 2 * Math.PI);
		ctx.clip();
		ctx.shadowColor = glowColor;
		ctx.shadowBlur = 12;
		ctx.fillStyle = baseColor;
		ctx.beginPath();
		ctx.arc(p.x, p.y, sizePx, 0, 2 * Math.PI);
		ctx.fill();
		ctx.shadowBlur = 0;
		ctx.fillStyle = coreColor;
		ctx.beginPath();
		ctx.arc(p.x, p.y, Math.max(1.4, sizePx * 0.38), 0, 2 * Math.PI);
		ctx.fill();
		ctx.restore();
	}

	function drawSubsolarPoint(ctx, subsolar, centerLat, centerLon, mapRadiusPx, zoomKm){
		drawCelestialPoint(ctx, subsolar, centerLat, centerLon, mapRadiusPx, zoomKm, "#ffd84d", "rgba(255, 248, 210, 0.98)", 5.2, "rgba(255, 220, 90, 0.88)");
	}

	function drawMoonPoint(ctx, sublunar, centerLat, centerLon, mapRadiusPx, zoomKm){
		drawCelestialPoint(ctx, sublunar, centerLat, centerLon, mapRadiusPx, zoomKm, "#a8adb3", "rgba(248, 250, 255, 0.92)", 3.8, "rgba(196, 206, 224, 0.55)");
	}

	function drawGrayline(ctx, centerLat, centerLon, mapRadiusPx, zoomKm){
		if(!MapGraylineEnabled){
			return;
		}
		if(!GraylineNtpOk || GraylineEpoch <= 0){
			return;
		}
		var theme = getMapThemeStyle();
		var subsolar = getSubsolarPoint(Math.floor(GraylineEpoch / 60) * 60);
		if(!graylineCacheCanvas){
			graylineCacheCanvas = document.createElement('canvas');
			graylineCacheCanvas.width = BoxSize;
			graylineCacheCanvas.height = BoxSize;
		}
		var minuteEpoch = Math.floor(GraylineEpoch / 60) * 60;
		var cacheKey = String(centerLat) + "|" + String(centerLon) + "|" + String(zoomKm) + "|" + String(minuteEpoch);
		if(graylineCacheKey !== cacheKey){
			var gctx = graylineCacheCanvas.getContext('2d');
			gctx.clearRect(0, 0, BoxSize, BoxSize);
			var step = 3;
			var maxAlpha = Math.max(0, Math.min(100, Number(GraylineDarkness))) / 100;
			for(var py=0; py<BoxSize; py+=step){
				for(var px=0; px<BoxSize; px+=step){
					var sample = inverseProjectAzimuthal(px + step * 0.5, py + step * 0.5, centerLat, centerLon, mapRadiusPx, zoomKm);
					if(!sample){
						continue;
					}
					var altDeg = solarAltitudeDeg(sample.lat, sample.lon, subsolar);
					if(altDeg >= 1){
						continue;
					}
					var alpha = 0;
					if(altDeg <= -5){
						alpha = maxAlpha;
					}else{
						alpha = maxAlpha * ((1 - altDeg) / 6);
					}
					gctx.fillStyle = "rgba(" + theme.grayline + "," + alpha.toFixed(3) + ")";
					gctx.fillRect(px, py, step, step);
				}
			}
			graylineCacheKey = cacheKey;
		}
		ctx.save();
		ctx.beginPath();
		ctx.arc(Xcenter, Ycenter, mapRadiusPx, 0, 2 * Math.PI);
		ctx.clip();
		ctx.filter = "blur(0px)";
		ctx.drawImage(graylineCacheCanvas, 0, 0);
		ctx.filter = "none";
		ctx.restore();
	}

	function drawSunMoonOverlay(ctx, centerLat, centerLon, mapRadiusPx, zoomKm){
		if(!GraylineNtpOk || GraylineEpoch <= 0){
			return;
		}
		var minuteEpoch = Math.floor(GraylineEpoch / 60) * 60;
		var subsolar = getSubsolarPoint(minuteEpoch);
		drawSubsolarPoint(ctx, subsolar, centerLat, centerLon, mapRadiusPx, zoomKm);
		drawMoonPoint(ctx, getSublunarPoint(minuteEpoch), centerLat, centerLon, mapRadiusPx, zoomKm);
	}

	function drawBitmapSunOverlay(ctx){
		if(!GraylineNtpOk || GraylineEpoch <= 0){
			return;
		}
		var center = maidenheadToLatLon(MapLocator);
		if(!center){
			center = maidenheadToLatLon("JO60UC");
		}
		if(!center){
			return;
		}
		var minuteEpoch = Math.floor(GraylineEpoch / 60) * 60;
		drawCelestialPoint(ctx, getSubsolarPoint(minuteEpoch), center.lat, center.lon, BoxSize / 2 * 0.9, 20000, "#ffd84d", "rgba(255, 248, 210, 0.98)", 6.0, "rgba(255, 220, 90, 0.95)");
		drawCelestialPoint(ctx, getSublunarPoint(minuteEpoch), center.lat, center.lon, BoxSize / 2 * 0.9, 20000, "#a8adb3", "rgba(248, 250, 255, 0.96)", 4.5, "rgba(196, 206, 224, 0.65)");

	function drawOutsideCircleMask(ctx, mapRadiusPx){
		ctx.beginPath();
		ctx.rect(0, 0, BoxSize, BoxSize);
		ctx.arc(Xcenter, Ycenter, mapRadiusPx, 0, 2 * Math.PI, true);
		ctx.fillStyle = "#000";
		ctx.fill("evenodd");
	}

	function drawProjectedLandFill(ctx, centerLat, centerLon, mapRadiusPx, zoomKm){
		var theme = getMapThemeStyle();
		var step = 2;
		if(!locatorFillCacheCanvas){
			locatorFillCacheCanvas = document.createElement('canvas');
			locatorFillCacheCanvas.width = BoxSize;
			locatorFillCacheCanvas.height = BoxSize;
		}
		var fillKey = String(centerLat) + "|" + String(centerLon) + "|" + String(mapRadiusPx) + "|" + String(zoomKm) + "|" + String(step);
		if(locatorFillCacheKey === fillKey){
			ctx.drawImage(locatorFillCacheCanvas, 0, 0);
			return;
		}

		var fillCtx = locatorFillCacheCanvas.getContext('2d');
		fillCtx.clearRect(0, 0, BoxSize, BoxSize);
		fillCtx.fillStyle = theme.landFill;

		for(var py=0; py<BoxSize; py+=step){
			for(var px=0; px<BoxSize; px+=step){
				var sample = inverseProjectAzimuthal(px + step * 0.5, py + step * 0.5, centerLat, centerLon, mapRadiusPx, zoomKm);
				if(!sample){
					continue;
				}
				if(isLandLatLon(sample.lat, sample.lon)){
					fillCtx.fillRect(px, py, step, step);
				}
			}
		}

		locatorFillCacheKey = fillKey;
		ctx.drawImage(locatorFillCacheCanvas, 0, 0);
	}

	function drawElevationSkyMap(){
		var c = document.getElementById('Map');
		if (!c.getContext) { return; }
		var ctx = c.getContext('2d');
		var mapRadiusPx = BoxSize / 2 * 0.9;

		ctx.clearRect(0, 0, BoxSize, BoxSize);
		ctx.fillStyle = "#000";
		ctx.fillRect(0, 0, BoxSize, BoxSize);

		ctx.save();
		ctx.beginPath();
		ctx.moveTo(Xcenter - mapRadiusPx, Ycenter);
		ctx.arc(Xcenter, Ycenter, mapRadiusPx, Math.PI, 2 * Math.PI);
		ctx.closePath();
		ctx.clip();

		var sky = ctx.createLinearGradient(0, Ycenter - mapRadiusPx, 0, Ycenter);
		sky.addColorStop(0.00, "#000208");
		sky.addColorStop(0.18, "#040916");
		sky.addColorStop(0.40, "#0b1020");
		sky.addColorStop(0.62, "#260914");
		sky.addColorStop(0.80, "#5f110b");
		sky.addColorStop(0.93, "#d13b00");
		sky.addColorStop(1.00, "#240601");
		ctx.fillStyle = sky;
		ctx.fillRect(0, Ycenter - mapRadiusPx, BoxSize, mapRadiusPx);

		var glow = ctx.createRadialGradient(Xcenter, Ycenter + mapRadiusPx * 0.01, mapRadiusPx * 0.01, Xcenter, Ycenter + mapRadiusPx * 0.01, mapRadiusPx * 0.84);
		glow.addColorStop(0.00, "rgba(255,220,84,0.14)");
		glow.addColorStop(0.16, "rgba(255,140,24,0.22)");
		glow.addColorStop(0.34, "rgba(228,68,10,0.22)");
		glow.addColorStop(0.60, "rgba(104,10,16,0.18)");
		glow.addColorStop(1.00, "rgba(0,0,0,0)");
		ctx.fillStyle = glow;
		ctx.fillRect(Xcenter - mapRadiusPx, Ycenter - mapRadiusPx, mapRadiusPx * 2, mapRadiusPx * 1.02);

		var band = ctx.createLinearGradient(0, Ycenter - mapRadiusPx * 0.14, 0, Ycenter);
		band.addColorStop(0.00, "rgba(255,136,30,0.00)");
		band.addColorStop(0.42, "rgba(255,86,10,0.10)");
		band.addColorStop(0.76, "rgba(232,44,0,0.28)");
		band.addColorStop(1.00, "rgba(255,170,26,0.30)");
		ctx.fillStyle = band;
		ctx.fillRect(0, Ycenter - mapRadiusPx * 0.14, BoxSize, mapRadiusPx * 0.14);

		var texture = ctx.createLinearGradient(0, Ycenter - mapRadiusPx * 0.70, 0, Ycenter - mapRadiusPx * 0.08);
		texture.addColorStop(0.00, "rgba(255,110,18,0.00)");
		texture.addColorStop(0.55, "rgba(232,58,0,0.12)");
		texture.addColorStop(1.00, "rgba(168,18,0,0.18)");
		ctx.fillStyle = texture;
		for(var y = Ycenter - mapRadiusPx * 0.72; y < Ycenter - mapRadiusPx * 0.08; y += 16){
			var phase = ((y - (Ycenter - mapRadiusPx * 0.72)) / 16) % 2;
			for(var x = -20; x < BoxSize + 20; x += 46){
				var ox = phase ? 12 : 0;
				ctx.fillRect(x + ox, y, 28, 5);
			}
		}

		ctx.restore();
	}

	function drawLocatorMapCanvas(centerLat, centerLon, mapRadiusPx, zoomKm){
		var theme = getMapThemeStyle();
		var c = document.getElementById('Map');
		if (!c.getContext) { return; }
		var ctx = c.getContext('2d');

		ctx.clearRect(0, 0, BoxSize, BoxSize);
		ctx.fillStyle = "#000";
		ctx.fillRect(0, 0, BoxSize, BoxSize);

		if(LocatorLandFillMode){
			ctx.beginPath();
			ctx.arc(Xcenter, Ycenter, mapRadiusPx, 0, 2 * Math.PI);
			ctx.fillStyle = getMapBackgroundCanvasStyle(ctx, theme, mapRadiusPx);
			ctx.fill();

			drawProjectedLandFill(ctx, centerLat, centerLon, mapRadiusPx, zoomKm);
			if(MapBordersEnabled){
				drawGeoLineCollection(ctx, COUNTRY_BORDERS, centerLat, centerLon, mapRadiusPx, zoomKm, theme.borderStroke, theme.borderWidth || 1.0);
			}
			drawGrayline(ctx, centerLat, centerLon, mapRadiusPx, zoomKm);
			drawSunMoonOverlay(ctx, centerLat, centerLon, mapRadiusPx, zoomKm);
			drawDxccPrefixes(ctx, centerLat, centerLon, mapRadiusPx, zoomKm);
			drawOutsideCircleMask(ctx, mapRadiusPx);

			ctx.strokeStyle = theme.ring;
			ctx.lineWidth = 1;
			for(var ring = 1; ring <= 4; ring++){
				ctx.beginPath();
				ctx.arc(Xcenter, Ycenter, mapRadiusPx * ring / 4, 0, 2 * Math.PI);
				ctx.stroke();
			}
		}else{
			ctx.save();
			ctx.beginPath();
			ctx.arc(Xcenter, Ycenter, mapRadiusPx, 0, 2 * Math.PI);
			ctx.clip();
			ctx.fillStyle = getMapBackgroundCanvasStyle(ctx, theme, mapRadiusPx);
			ctx.fillRect(0, 0, BoxSize, BoxSize);
			ctx.strokeStyle = theme.ring;
			ctx.lineWidth = 1;
			for(var ring = 1; ring <= 4; ring++){
				ctx.beginPath();
				ctx.arc(Xcenter, Ycenter, mapRadiusPx * ring / 4, 0, 2 * Math.PI);
				ctx.stroke();
			}
			drawGeoLineCollection(ctx, LAND_OUTLINES, centerLat, centerLon, mapRadiusPx, zoomKm, theme.landStroke, 1.2);
			if(MapBordersEnabled){
				drawGeoLineCollection(ctx, COUNTRY_BORDERS, centerLat, centerLon, mapRadiusPx, zoomKm, theme.borderStroke, theme.borderWidth || 1.0);
			}
			drawGrayline(ctx, centerLat, centerLon, mapRadiusPx, zoomKm);
			drawSunMoonOverlay(ctx, centerLat, centerLon, mapRadiusPx, zoomKm);
			drawDxccPrefixes(ctx, centerLat, centerLon, mapRadiusPx, zoomKm);
			ctx.restore();
		}
	}

	function drawLocatorMap(){
		if(isElevationVectorMode()){
			drawElevationSkyMap();
			return;
		}
		var mapRadiusPx = BoxSize / 2 * 0.9;
		var center = maidenheadToLatLon(MapLocator);
		if(!center){
			center = maidenheadToLatLon("JO60UC");
		}
		var zoomKm = Number(MapZoomKm);
		if(!(zoomKm >= 1000 && zoomKm <= 20000)){
			zoomKm = 5000;
		}

		var key = String(MapLocator).toUpperCase() + "|" + String(zoomKm) + "|" + (MapBordersEnabled ? "b1" : "b0");
		var c = document.getElementById('Map');
		if (!c.getContext) { return; }
		var ctx = c.getContext('2d');

		if(LocatorLandFillMode){
			drawLocatorMapCanvas(center.lat, center.lon, mapRadiusPx, zoomKm);
			return;
		}

		if(locatorSvgImg && locatorSvgLastKey === key && locatorSvgImg.complete){
			ctx.clearRect(0, 0, BoxSize, BoxSize);
			ctx.drawImage(locatorSvgImg, 0, 0, BoxSize, BoxSize);
			drawGrayline(ctx, center.lat, center.lon, mapRadiusPx, zoomKm);
			drawSunMoonOverlay(ctx, center.lat, center.lon, mapRadiusPx, zoomKm);
			drawDxccPrefixes(ctx, center.lat, center.lon, mapRadiusPx, zoomKm);
			return;
		}
		if(locatorSvgLoadingKey === key){
			return;
		}

		var svg = buildLocatorSvg(center.lat, center.lon, mapRadiusPx, zoomKm);
		var img = new Image();
		locatorSvgLastKey = key;
		locatorSvgLoadingKey = key;
		img.onload = function(){
			locatorSvgImg = img;
			locatorSvgLoadingKey = "";
			ctx.clearRect(0, 0, BoxSize, BoxSize);
			ctx.drawImage(img, 0, 0, BoxSize, BoxSize);
			drawGrayline(ctx, center.lat, center.lon, mapRadiusPx, zoomKm);
			drawSunMoonOverlay(ctx, center.lat, center.lon, mapRadiusPx, zoomKm);
			drawDxccPrefixes(ctx, center.lat, center.lon, mapRadiusPx, zoomKm);
		};
		img.onerror = function(){
			locatorSvgLoadingKey = "";
			// fallback for environments with stricter data-uri SVG policy
			drawLocatorMapCanvas(center.lat, center.lon, mapRadiusPx, zoomKm);
		};
		img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
	}


	function map(){
		if (Number(MapSource) === -1) {
			return;
		}
		if (Number(MapSource) === 1) {
			if (Number(Elevation) === 1) {
				drawElevationSkyMap();
				return;
			}
			var m = document.getElementById('Map');
			if (m && m.getContext) {
				var mctx = m.getContext('2d');
				mctx.clearRect(0, 0, BoxSize, BoxSize);
				mctx.fillStyle = "#000";
				mctx.fillRect(0, 0, BoxSize, BoxSize);
			}
			ensureMapDataset(drawLocatorMap);
			return;
		}

		// If MapUrl is not ready yet, retry later
		if (!MapUrl || MapUrl === "0") {
			setTimeout(map, 1000);   // retry in 1 second
			return;
		}

		var c = document.getElementById('Map');
		if (c.getContext) {
			var ctx = c.getContext('2d');
			var img1 = new Image();

				// Draw the map once the image is fully loaded
				img1.onload = function () {
				if (Number(MapSource) !== 0) {
					return;
				}
				ctx.drawImage(img1, 0, 0, BoxSize, BoxSize);
				drawBitmapSunOverlay(ctx);
				};

			// If loading fails (slow internet, temporary outage), retry later
			img1.onerror = function () {
			setTimeout(map, 2000); // retry in 2 seconds
			};

			// Cache-busting to avoid loading a broken or outdated cached image
			img1.src =
			String(MapUrl) +
			(String(MapUrl).includes("?") ? "&" : "?") +
			"t=" + Date.now();
		}
	}

	function mapOLD(){
		var ctx = document.getElementById('Map');
		if (ctx.getContext) {
				ctx = ctx.getContext('2d');
				var img1 = new Image();
				img1.onload = function () {
						ctx.drawImage(img1, 0, 0, BoxSize, BoxSize);
				};
				img1.src = String(MapUrl);
		}
	}

	function Xcoordinate(dir, r){
	  return Xcenter + Math.sin(dir * Math.PI / 180) * r;
	}
	function Ycoordinate(dir, r){
	  return Ycenter - Math.cos(dir * Math.PI / 180) * r;
	}

	function AZ(Azimuth){
	  var c = document.getElementById("Azimuth");
	  var az = c.getContext("2d");
		az.clearRect(0, 0, BoxSize, BoxSize);
	  az.beginPath();
		var hasTargetAzimuth = hasTargetAzimuthValue();
		var AZtargetTmp = hasTargetAzimuth ? Number(AZtarget) + Number(AzShift) : 0;
		var AzimuthMapTmp = Azimuth;
		if(hasTargetAzimuth && Number(AZtargetTmp) > 360){
			AZtargetTmp=Number(AZtargetTmp)-360;
		}
		if(Number(AzimuthMapTmp) > 360){
			AzimuthMapTmp=Number(AzimuthMapTmp)-360;
		}
			if(hasTargetAzimuth && Math.abs(Number(AZtargetTmp) - Number(AzimuthMapTmp)) > Number(AntRadiationAngle)/2 ){
				az.moveTo(BoxSize/2, BoxSize/2);
			  az.lineTo(Xcoordinate(Number(AZtarget), BoxSize/2*0.9), Ycoordinate(Number(AZtarget), BoxSize/2*0.9));
			}
			// console.log ('Number(Azimuth) ' + Number(Azimuth) );

		  az.lineWidth = 5;
			if (Number(Azimuth) < 0 || Number(Azimuth) > Number(AzRange) ) {
				az.strokeStyle = '#c0c0c0';
			}else{
				if (Status != 4) {
					az.strokeStyle = "red";
				}else if (Azimuth > 359) {
					az.strokeStyle = "orange";
				}else{
					az.strokeStyle = '#00aa00';
				}
			}
		  az.moveTo(Xcoordinate(Number(Azimuth) + Number(AzShift), BoxSize/2*0.9), Ycoordinate(Number(Azimuth) + Number(AzShift), BoxSize/2*0.9));
		  az.lineTo(Xcoordinate(Number(Azimuth) + Number(AzShift), BoxSize/2*0.7), Ycoordinate(Number(Azimuth) + Number(AzShift), BoxSize/2*0.7));
		az.stroke();

		// cw/ccw arrow
		var Ofset = 0;
		az.beginPath();
			if (Status != 4) {
				az.fillStyle = "red";
				if(Status<4){
					Ofset = -6;
				}else{
					Ofset = 6;
				}
				az.moveTo(Xcoordinate(Number(Azimuth) + Number(AzShift)+Number(Ofset)/2, BoxSize/2*0.85), Ycoordinate(Number(Azimuth) + Number(AzShift)+Number(Ofset)/2, BoxSize/2*0.85));
			  az.lineTo(Xcoordinate(Number(Azimuth) + Number(AzShift)+Number(Ofset)/2, BoxSize/2*0.75), Ycoordinate(Number(Azimuth) + Number(AzShift)+Number(Ofset)/2, BoxSize/2*0.75));
				az.lineTo(Xcoordinate(Number(Azimuth) + Number(AzShift)+Number(Ofset)*1.3, BoxSize/2*0.8), Ycoordinate(Number(Azimuth) + Number(AzShift)+Number(Ofset)*1.3, BoxSize/2*0.8));

				az.moveTo(Xcoordinate(Number(Azimuth) + Number(AzShift)+Number(Ofset)*1.5, BoxSize/2*0.83), Ycoordinate(Number(Azimuth) + Number(AzShift)+Number(Ofset)*1.5, BoxSize/2*0.83));
			  az.lineTo(Xcoordinate(Number(Azimuth) + Number(AzShift)+Number(Ofset)*1.5, BoxSize/2*0.77), Ycoordinate(Number(Azimuth) + Number(AzShift)+Number(Ofset)*1.5, BoxSize/2*0.77));
				az.lineTo(Xcoordinate(Number(Azimuth) + Number(AzShift)+Number(Ofset)*2, BoxSize/2*0.8), Ycoordinate(Number(Azimuth) + Number(AzShift)+Number(Ofset)*2, BoxSize/2*0.8));
			}
		az.fill();

			// az.registerFont(path.join(__dirname, "fonts", "RobotoCondensed-Regular.ttf"), { family: "Roboto Condensed" });
			// az.font = "100px 'Roboto Condensed'";
			az.font = "bold 100px Arial";
			az.textAlign = 'center';
			az.textBaseline = 'middle';
			if(Elevation==0){
				var ShowAzimuth = Number(Azimuth) + Number(AzShift);
			}else{
				var ShowAzimuth = Number(Azimuth);
			}
			if(ShowAzimuth > 359){
				ShowAzimuth = Number(ShowAzimuth) - 360;
			}
			var pulseMs = 240;
			var pulseGain = 0;
			if(AzimuthPulseStart > 0){
				var pulseAge = new Date().getTime() - AzimuthPulseStart;
				if(pulseAge < pulseMs){
					pulseGain = 1 - pulseAge / pulseMs;
				}else{
					AzimuthPulseStart = 0;
				}
			}
			if (Number(Azimuth) < 0 || Number(Azimuth) > Number(AzRange) ) {
				az.font = "bold 30px Arial";
				az.fillStyle = '#c0c0c0';
				if (Azimuth < 0) {
					az.fillText("CCW endstop zone", Xcoordinate(Number(Azimuth) + Number(AzShift) + 180, BoxSize*0.2), Ycoordinate(Number(Azimuth) + Number(AzShift) + 180, BoxSize*0.2));
				}else{
					az.fillText("CW endstop zone", Xcoordinate(Number(Azimuth) + Number(AzShift) + 180, BoxSize*0.2), Ycoordinate(Number(Azimuth) + Number(AzShift) + 180, BoxSize*0.2));
				}
			}else{
				if (Status != 4) {
					az.fillStyle = "red";
				}else if (Azimuth > 359) {
					az.fillStyle = "orange";
				}else{
				az.fillStyle = "#00aa00";
				}
				if(DegOverlayEnabled){
					var pulseFont = 100 + Math.round(pulseGain * 10);
					az.font = "bold " + String(pulseFont) + "px Arial";
					az.shadowColor = "rgba(0,0,0," + String((0.56 + pulseGain * 0.16).toFixed(2)) + ")";
					az.shadowBlur = 10 + pulseGain * 10;
					az.shadowOffsetX = 0;
					az.shadowOffsetY = 4;
					az.fillText(ShowAzimuth+String.fromCharCode(176), Xcoordinate(Number(Azimuth) + Number(AzShift) + 180, BoxSize*0.2), Ycoordinate(Number(Azimuth) + Number(AzShift) + 180, BoxSize*0.2));
					az.shadowBlur = 0;
					az.shadowColor = "transparent";
					az.shadowOffsetX = 0;
					az.shadowOffsetY = 0;
				}
			}
		az.beginPath();
			az.moveTo(BoxSize/2, BoxSize/2);
			var CcwAngle = Number(AntRadiationAngle)/2;
			for(var i=0;i<17;i++){
				az.lineTo(Xcoordinate(Number(Azimuth) + Number(AzShift)-Number(CcwAngle)+Number(AntRadiationAngle)/16*i, Number(BoxSize)/2*0.9), Ycoordinate(Number(Azimuth) + Number(AzShift)-Number(CcwAngle)+Number(AntRadiationAngle)/16*i, Number(BoxSize)/2*0.9));
			}
			if (Number(Azimuth) < 0 || Number(Azimuth) > Number(AzRange) ) {
				az.fillStyle = "rgba(255, 255, 255, 0.10)";
			}else{
				if (Status != 4) {
					az.fillStyle = "rgba(255, 0, 0, 0.25)";
				}else if (Azimuth > 359) {
				 az.fillStyle = "rgba(255, 165, 0, 0.25)";
				}else{
					az.fillStyle = "rgba(255, 255, 255, 0.25)";
				}
			}
		az.fill();
	}

	function Static(){
	  var con = document.getElementById("Static");

	  // overlap
	  var overlap = con.getContext("2d");
		overlap.clearRect(0, 0, BoxSize, BoxSize);
		overlap.lineWidth = 8;
		overlap.strokeStyle = 'orange';
		var START = 270+Number(AzShift);
		var STOP  = 270+Number(AzShift)+Number(AzRange)-360;
		if(Number(AzRange)>360){
		  overlap.beginPath();
		  overlap.arc(Xcenter, Ycenter, BoxSize/2*0.9-8, Number(START) * Math.PI/180, Number(STOP) * Math.PI/180 );
		  overlap.stroke();
		}

	  // direction
	  var direction = con.getContext("2d");
	  direction.beginPath();
		if(Elevation==0){
			direction.arc(Xcenter, Ycenter, BoxSize/2*0.9, 0, 2 * Math.PI);
		}else{
			direction.arc(Xcenter, Ycenter, BoxSize/2*0.9, Math.PI, 2 * Math.PI);
		}
	  direction.lineWidth = 2;
	  direction.strokeStyle = '#c0c0c0';
	  direction.font = "20px Arial";
		direction.textAlign = 'center';
		direction.textBaseline = 'middle';
	  direction.fillStyle = "#808080";
		if(Elevation==0){
			for(var i=0;i<36;i++){
				if(i %9 === 0){
				}else{
					direction.moveTo(Xcoordinate(i*10, BoxSize/2*0.95), Ycoordinate(i*10, BoxSize/2*0.95));
					direction.lineTo(Xcoordinate(i*10, BoxSize/2*0.9), Ycoordinate(i*10, BoxSize/2*0.9));
				}
				if(i %3 === 0){
					if(i %9 === 0){
					}else{
						direction.fillText(i*10, Xcoordinate(i*10, BoxSize/2), Ycoordinate(i*10, BoxSize/2));
					}
				}
			}
		}else{
			for (var i = 0; i <= 18; i++) {
				direction.moveTo(Xcoordinate(i*10+270, BoxSize/2*0.95), Ycoordinate(i*10+270, BoxSize/2*0.95));
				direction.lineTo(Xcoordinate(i*10+270, BoxSize/2*0.9), Ycoordinate(i*10+270, BoxSize/2*0.9));
				if(i %3 === 0){
					if(i %9 === 0){
					}else{
						direction.fillText(i*10, Xcoordinate(i*10+270, BoxSize/2), Ycoordinate(i*10+270, BoxSize/2));
					}
				}
			}
		}
		if(Elevation==0){
		  	direction.fillStyle = "white";
			direction.fillText("N", BoxSize/2, BoxSize*0.025);
			direction.fillText("E", BoxSize*0.975, BoxSize/2);
			direction.fillText("S", BoxSize/2, BoxSize* 0.975);
			direction.fillText("W", BoxSize*0.025, BoxSize/2);
		}else{
			direction.fillStyle = "#404040";
			direction.font = "73px Arial";
			direction.textAlign = 'center';
			direction.textBaseline = 'middle';
			// direction.fillText("Elevation", BoxSize/2, BoxSize* 0.95);
		}
		direction.stroke();
		// darkzone if <360
		if(AzRange<360){
			direction.beginPath();
			direction.lineWidth = 1;
		  direction.strokeStyle = 'white';
			direction.moveTo(BoxSize/2, BoxSize/2);
			direction.lineTo(Xcoordinate(Number(AzShift), Number(BoxSize)/2*0.9), Ycoordinate(Number(AzShift), Number(BoxSize)/2*0.9));
			direction.moveTo(BoxSize/2, BoxSize/2);
			direction.lineTo(Xcoordinate(Number(AzShift) + Number(AzRange), Number(BoxSize)/2*0.9), Ycoordinate(Number(AzShift) + Number(AzRange), Number(BoxSize)/2*0.9));
			direction.stroke();

			if(Number(AzRange)+Number(AntRadiationAngle)<360){
				direction.beginPath();
					direction.fillStyle = "rgba(0, 0, 0, 0.5)";
					var DarkRange = 360-Number(AzRange)-Number(AntRadiationAngle);
					var Steps = (Number(DarkRange)-20)/10;
					direction.moveTo(BoxSize/2, BoxSize/2);
					direction.lineTo(Xcoordinate(Number(AzShift) + Number(AzRange) + Number(AntRadiationAngle)/2, Number(BoxSize)/2*0.9), Ycoordinate(Number(AzShift) + Number(AzRange) + Number(AntRadiationAngle)/2, Number(BoxSize)/2*0.9));
					for(var i=0;i<Steps;i++){
						direction.lineTo(Xcoordinate(Number(AzShift) + Number(AzRange) + Number(AntRadiationAngle)/2 + 10*(Number(i)+1), Number(BoxSize)/2*0.9), Ycoordinate(Number(AzShift) + Number(AzRange) + Number(AntRadiationAngle)/2 + 10*(Number(i)+1), Number(BoxSize)/2*0.9));
					}
					direction.lineTo(Xcoordinate(Number(AzShift)-Number(AntRadiationAngle)/2, Number(BoxSize)/2*0.9), Ycoordinate(Number(AzShift)-Number(AntRadiationAngle)/2, Number(BoxSize)/2*0.9));
				direction.fill();
			}
		}

	}

	function StaticBot(){
	  var con = document.getElementById("DirLine");
	  var dirline = con.getContext("2d");
		dirline.clearRect(0, 0, BoxSize, BoxSize);
		if(Elevation!=0){
			return;
		}

	  // direction line under map
	  dirline.beginPath();
	  dirline.lineWidth = 1;
	  dirline.strokeStyle = '#606060';
	    for(var i=0;i<24;i++){
	  		if(i %2 === 0){
					dirline.moveTo(Xcoordinate(i*15, BoxSize/2*0.1), Ycoordinate(i*15, BoxSize/2*0.1));
					dirline.lineTo(Xcoordinate(i*15, BoxSize/2*0.9), Ycoordinate(i*15, BoxSize/2*0.9));
	  		}else{
					dirline.moveTo(Xcoordinate(i*15, BoxSize/2*0.3), Ycoordinate(i*15, BoxSize/2*0.3));
	  			dirline.lineTo(Xcoordinate(i*15, BoxSize/2*0.9), Ycoordinate(i*15, BoxSize/2*0.9));
	  		}
	    }
	  dirline.stroke();
	}

	</script>
